<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache">
<title>坦克大战 - Tank Battle v2</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:'Courier New',monospace;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  body{display:flex;justify-content:center;align-items:center;}
  .game-wrapper{display:flex;gap:20px;align-items:stretch;}
  .side-panel{background:#16213e;border:3px solid #0f3460;border-radius:12px;padding:18px 22px;color:#e94560;display:flex;flex-direction:column;justify-content:flex-start;gap:12px;min-width:185px;max-width:195px;}
  .side-panel h2{font-size:20px;text-align:center;letter-spacing:3px;color:#f5c518;text-shadow:0 0 10px rgba(245,197,24,0.5);margin-bottom:0;}
  .stat{text-align:center;}
  .stat-label{font-size:11px;color:#8a8a8a;letter-spacing:2px;text-transform:uppercase;}
  .stat-value{font-size:30px;font-weight:bold;color:#fff;}
  .enemy-count{color:#e94560;}
  .xp-bar-outer{width:100%;height:8px;background:#1a1a3e;border-radius:4px;overflow:hidden;}
  .xp-bar-inner{height:100%;background:linear-gradient(90deg,#f5c518,#ff9500);border-radius:4px;transition:width 0.3s;}
  .buff-indicator{font-size:11px;padding:4px 8px;border-radius:4px;text-align:center;display:none;animation:pulse 0.5s infinite alternate;}
  .buff-indicator.active{display:block;}
  .buff-shield{background:rgba(0,200,255,0.2);color:#00c8ff;border:1px solid #00c8ff;}
  .buff-speed{background:rgba(255,200,0,0.2);color:#ffc800;border:1px solid #ffc800;}
  .buff-rapid{background:rgba(255,100,0,0.2);color:#ff6400;border:1px solid #ff6400;}
  .buff-freeze{background:rgba(100,200,255,0.2);color:#64c8ff;border:1px solid #64c8ff;}
  @keyframes pulse{from{opacity:1}to{opacity:0.5}}
  canvas{border:3px solid #0f3460;border-radius:8px;image-rendering:pixelated;background:#0a0a0a;display:block;}
  .controls-info{text-align:center;font-size:10px;color:#5a5a8a;line-height:1.6;display:block;}
  .controls-info span{color:#f5c518;}
  .status-msg{text-align:center;font-size:12px;font-weight:bold;min-height:18px;letter-spacing:1px;}
  .divider{border-top:1px solid #0f3460;}
  .touch-controls{display:none;position:fixed;bottom:0;left:0;right:0;height:220px;pointer-events:none;z-index:10;}
  .touch-joystick{position:absolute;bottom:30px;left:30px;width:140px;height:140px;pointer-events:auto;}
  .touch-joystick .base{width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,0.08);border:3px solid rgba(255,255,255,0.2);position:relative;}
  .touch-joystick .thumb{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.4);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:transform 0.05s;}
  .touch-shoot{position:absolute;bottom:45px;right:30px;width:80px;height:80px;border-radius:50%;background:rgba(255,60,60,0.15);border:3px solid rgba(255,60,60,0.4);pointer-events:auto;display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,0.7);letter-spacing:1px;}
  .touch-shoot:active{background:rgba(255,60,60,0.35);}
  #mobileHint{display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:12px;z-index:5;pointer-events:none;}

  /* Desktop: show all */
  @media(min-width:769px){
    .side-panel{display:flex;}
    .controls-info{display:block;}
    .touch-controls{display:none !important;}
    #mobileHint{display:none !important;}
  }
  /* Mobile: stack vertically */
  @media(max-width:768px){
    body{align-items:flex-start;padding-top:8px;}
    .game-wrapper{flex-direction:column;align-items:center;gap:6px;}
    .side-panel{flex-direction:row;flex-wrap:wrap;justify-content:center;align-items:center;gap:8px 16px;min-width:auto;max-width:95vw;padding:8px 14px;border-radius:8px;border-width:2px;}
    .side-panel h2{font-size:14px;letter-spacing:2px;width:100%;}
    .side-panel .divider{display:none;}
    .side-panel .stat{margin:0;}
    .stat-label{font-size:9px;letter-spacing:1px;}
    .stat-value{font-size:20px;}
    canvas{max-width:96vw;max-height:52vh;border-width:2px;width:auto;height:auto;}
    .controls-info{display:none;}
    .status-msg{width:100%;}
    #mobileHint{display:block;}
    .touch-controls{display:block;}
    .xp-bar-outer{width:80px;height:5px;}
    .xp-bar-inner{height:5px;}
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="side-panel">
    <h2>坦 克 大 战</h2>
    <div class="stat"><div class="stat-label">得分</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label">敌人</div><div class="stat-value enemy-count" id="remaining">20</div></div>
    <div class="stat"><div class="stat-label">生命</div><div class="stat-value" id="livesDisplay" style="font-size:22px;">🛡️ 🛡️ 🛡️</div></div>
    <div class="stat"><div class="stat-label">关卡</div><div class="stat-value" id="level" style="font-size:24px;">1</div></div>
    <div class="stat">
      <div class="stat-label">等级 <span id="upgradeDisplay" style="color:#f5c518;">Lv1</span></div>
      <div class="xp-bar-outer"><div class="xp-bar-inner" id="xpBar" style="width:0%"></div></div>
      <div style="font-size:9px;color:#8a8a8a;margin-top:1px;"><span id="xpText">0/300</span></div>
    </div>
    <div class="buff-indicator" id="buffIndicator"></div>
    <div class="status-msg" id="statusMsg">按Enter/点击开始</div>
    <div class="controls-info"><span>↑↓←→</span>移动 <span>空格</span>射击 <span>Enter</span>暂停 <span>R</span>重来</div>
  </div>
  <canvas id="gameCanvas"></canvas>
</div>

<div class="touch-controls" id="touchControls">
  <div class="touch-joystick" id="joystick">
    <div class="base"></div>
    <div class="thumb" id="joyThumb"></div>
  </div>
  <div class="touch-shoot" id="touchShoot">射击</div>
</div>
<div id="mobileHint">← 虚拟摇杆移动 &nbsp;|&nbsp; 射击按钮 →</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const TILE = 32, COLS = 20, ROWS = 18;
canvas.width = COLS * TILE; canvas.height = ROWS * TILE;

// ---- GAME STATE ----
let score=0,lives=3,level=1;
let enemiesRemaining=20,enemiesPerLevel=20;
let totalEnemiesSpawned=0,maxEnemiesOnScreen=4;
let gameRunning=false,gameOver=false,gamePaused=false;
let enemySpawnTimer=0,enemySpawnInterval=120;
let xp=0,playerUpgrade=1;
let freezeTimer=0,speedBoostTimer=0,rapidFireTimer=0;
let baseRegenTimer=0;
let player=null,enemies=[],bullets=[],explosions=[],powerups=[],floatingTexts=[],map=[];

// ---- CONSTANTS ----
const TILE_EMPTY=0,TILE_BRICK=1,TILE_STEEL=2,TILE_BASE=3,TILE_WALL=4;
const DIR_UP=0,DIR_RIGHT=1,DIR_DOWN=2,DIR_LEFT=3;
const dx=[0,1,0,-1],dy=[-1,0,1,0];
const XP_THRESHOLDS=[0,300,700,1300,2200,3600,5500,8000,99999];
const UPGRADE_COLORS=['#4ecdc4','#44bd32','#f39c12','#e67e22','#e74c3c','#9b59b6','#1abc9c','#ecf0f1'];

// ---- TOUCH ----
let touchDir=null, touchShooting=false;

function setupTouch(){
  const jb=document.getElementById('joystick');
  const thumb=document.getElementById('joyThumb');
  const btn=document.getElementById('touchShoot');
  let jCenterX=0,jCenterY=0;
  let dragging=false;

  function getDir(dx,dy){
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<16)return null;
    const angle=Math.atan2(dy,dx);
    if(angle>-0.785&&angle<=0.785)return DIR_RIGHT;
    if(angle>0.785&&angle<=2.356)return DIR_DOWN;
    if(angle>2.356||angle<=-2.356)return DIR_LEFT;
    return DIR_UP;
  }

  jb.addEventListener('touchstart',e=>{
    e.preventDefault();
    const r=jb.getBoundingClientRect();
    jCenterX=r.left+r.width/2;jCenterY=r.top+r.height/2;
    const tx=e.touches[0].clientX-jCenterX,ty=e.touches[0].clientY-jCenterY;
    dragging=true;
    touchDir=getDir(tx,ty);
    thumb.style.transform=`translate(calc(-50% + ${tx*0.5}px), calc(-50% + ${ty*0.5}px))`;
  },{passive:false});
  jb.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(!dragging)return;
    const tx=e.touches[0].clientX-jCenterX,ty=e.touches[0].clientY-jCenterY;
    touchDir=getDir(tx,ty);
    const dist=Math.sqrt(tx*tx+ty*ty),maxR=55,scale=Math.min(dist,maxR)/dist;
    thumb.style.transform=`translate(calc(-50% + ${tx*scale}px), calc(-50% + ${ty*scale}px))`;
  },{passive:false});
  jb.addEventListener('touchend',e=>{
    e.preventDefault();
    dragging=false;touchDir=null;
    thumb.style.transform='translate(-50%,-50%)';
  },{passive:false});

  btn.addEventListener('touchstart',e=>{e.preventDefault();touchShooting=true;},{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();touchShooting=false;},{passive:false});
  btn.addEventListener('touchcancel',e=>{touchShooting=false;},{passive:false});

  // Start game on canvas tap
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(gameOver)resetGame();
    else{gamePaused=!gamePaused;if(!gameRunning)gameRunning=true;}
    updateUI();
  },{passive:false});
}

const POWERUP_TYPES={
  LIFE:{id:'life',label:'💚',color:'#2ecc71',weight:20},
  SHIELD:{id:'shield',label:'🛡️',color:'#00c8ff',weight:25},
  FREEZE:{id:'freeze',label:'❄️',color:'#64c8ff',weight:20},
  SPEED:{id:'speed',label:'⚡',color:'#ffc800',weight:15},
  RAPID:{id:'rapid',label:'🔥',color:'#ff6400',weight:20},
};
const POWERUP_KEYS=['LIFE','SHIELD','FREEZE','SPEED','RAPID'];

const ENEMY_TYPES={
  NORMAL:{id:'normal',label:'普通',color:'#e94560',hp:1,speed:1.0,shootDelay:80,xp:100,size:1,weight:100},
  FAST:{id:'fast',label:'快速',color:'#f39c12',hp:1,speed:1.8,shootDelay:60,xp:150,size:1,weight:100},
  ARMORED:{id:'armored',label:'装甲',color:'#8e44ad',hp:4,speed:0.8,shootDelay:100,xp:350,size:1.15,weight:100},
  HEAVY:{id:'heavy',label:'重型',color:'#c0392b',hp:6,speed:0.6,shootDelay:120,xp:600,size:1.3,weight:100},
};

function availableEnemyTypes(){
  const lv=level+Math.floor(playerUpgrade/2);
  if(lv>=6)return['NORMAL','FAST','ARMORED','HEAVY'];
  if(lv>=4)return['NORMAL','FAST','ARMORED'];
  if(lv>=2)return['NORMAL','FAST'];
  return['NORMAL'];
}
function pickEnemyType(){
  const keys=availableEnemyTypes();let total=0;
  for(const k of keys)total+=ENEMY_TYPES[k].weight;
  if(keys.includes('HEAVY'))total-=ENEMY_TYPES.HEAVY.weight*0.6;
  if(keys.includes('ARMORED'))total-=ENEMY_TYPES.ARMORED.weight*0.2;
  let r=Math.random()*total;
  for(const k of keys){let w=ENEMY_TYPES[k].weight;if(k==='HEAVY')w*=0.4;else if(k==='ARMORED')w*=0.8;r-=w;if(r<=0)return ENEMY_TYPES[k];}
  return ENEMY_TYPES.NORMAL;
}
function randomPowerupType(){
  let total=0;for(const k of POWERUP_KEYS)total+=POWERUP_TYPES[k].weight;
  let r=Math.random()*total;
  for(const k of POWERUP_KEYS){r-=POWERUP_TYPES[k].weight;if(r<=0)return POWERUP_TYPES[k];}
  return POWERUP_TYPES.SHIELD;
}

function xpForLevel(lv){return XP_THRESHOLDS[lv-1];}
function xpToNext(lv){return XP_THRESHOLDS[lv]-XP_THRESHOLDS[lv-1];}
function addXP(amount){xp+=amount;while(playerUpgrade<8&&xp>=XP_THRESHOLDS[playerUpgrade]){playerUpgrade++;applyUpgradeStats();}updateUI();}
function loseUpgrade(){if(playerUpgrade<=1)return;playerUpgrade--;xp=XP_THRESHOLDS[playerUpgrade-1];applyUpgradeStats();updateUI();}
function applyUpgradeStats(){if(player&&player.active){player.color=UPGRADE_COLORS[playerUpgrade-1];player.speed=2.5+(playerUpgrade-1)*0.4;player.shootDelay=Math.max(8,20-(playerUpgrade-1)*2);player.maxBullets=playerUpgrade>=6?3:playerUpgrade>=3?2:1;}}

// ---- INPUT ----
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Enter'){if(gameOver)resetGame();else{gamePaused=!gamePaused;if(!gameRunning)gameRunning=true;}updateUI();}
  if(e.key==='r'||e.key==='R')resetGame();
  e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;e.preventDefault();});
canvas.addEventListener('click',()=>{
  if(gameOver)resetGame();
  else{gamePaused=!gamePaused;if(!gameRunning)gameRunning=true;}
  updateUI();
});
setupTouch();

// ---- LEVEL MAPS ----
function defineBaseArea(m){m[ROWS-2][9]=TILE_BASE;m[ROWS-2][10]=TILE_BASE;m[ROWS-1][8]=TILE_STEEL;m[ROWS-1][9]=TILE_STEEL;m[ROWS-1][10]=TILE_STEEL;m[ROWS-1][11]=TILE_STEEL;m[ROWS-2][8]=TILE_STEEL;m[ROWS-2][11]=TILE_STEEL;m[ROWS-3][9]=TILE_STEEL;m[ROWS-3][10]=TILE_STEEL;}
function regenerateBase(){map[ROWS-2][9]=TILE_BASE;map[ROWS-2][10]=TILE_BASE;map[ROWS-1][8]=TILE_STEEL;map[ROWS-1][9]=TILE_STEEL;map[ROWS-1][10]=TILE_STEEL;map[ROWS-1][11]=TILE_STEEL;map[ROWS-2][8]=TILE_STEEL;map[ROWS-2][11]=TILE_STEEL;map[ROWS-3][9]=TILE_STEEL;map[ROWS-3][10]=TILE_STEEL;baseRegenTimer=0;}

function getLevelMap(n){const m=[];for(let r=0;r<ROWS;r++)m[r]=new Array(COLS).fill(TILE_EMPTY);
  for(let c=0;c<COLS;c++){m[0][c]=TILE_STEEL;m[ROWS-1][c]=TILE_STEEL;}for(let r=0;r<ROWS;r++){m[r][0]=TILE_STEEL;m[r][COLS-1]=TILE_STEEL;}
  defineBaseArea(m);
  const walls=[[[3,5],[4,5],[5,5],[6,5],[13,5],[14,5],[15,5],[16,5],[3,12],[4,12],[5,12],[6,12],[13,12],[14,12],[15,12],[16,12],[9,7],[10,7],[9,8],[10,8],[9,9],[10,9]],[[2,3],[3,3],[4,3],[5,3],[14,3],[15,3],[16,3],[17,3],[2,11],[3,11],[4,11],[5,11],[14,11],[15,11],[16,11],[17,11],[9,3],[9,4],[9,5],[9,6],[10,3],[10,4],[10,5],[10,6],[9,9],[9,10],[9,11],[10,9],[10,10],[10,11]],[[7,4],[8,4],[9,4],[10,4],[11,4],[12,4],[5,7],[6,7],[7,7],[8,7],[11,7],[12,7],[13,7],[14,7],[5,8],[6,8],[13,8],[14,8],[5,9],[6,9],[13,9],[14,9],[5,10],[6,10],[7,10],[8,10],[11,10],[12,10],[13,10],[14,10],[7,12],[8,12],[9,12],[10,12],[11,12],[12,12]],[[2,2],[3,2],[4,2],[5,2],[6,2],[13,2],[14,2],[15,2],[16,2],[17,2],[2,3],[3,6],[4,6],[5,6],[6,6],[13,6],[14,6],[15,6],[16,2],[17,3],[2,12],[3,12],[4,12],[5,12],[16,12],[17,12],[14,12],[15,12],[13,12],[2,11],[17,11],[9,3],[10,3],[9,11],[10,11]],[[3,2],[4,2],[14,2],[15,2],[3,3],[15,3],[7,2],[8,2],[9,2],[10,2],[7,4],[8,4],[9,4],[10,4],[1,5],[2,5],[3,5],[16,5],[17,5],[4,8],[5,8],[6,8],[12,8],[13,8],[14,8],[7,7],[8,7],[9,7],[10,7],[7,9],[8,9],[9,9],[10,9],[1,12],[2,12],[3,12],[16,12],[17,12]],[[2,2],[3,2],[4,2],[5,2],[14,2],[15,2],[16,2],[17,2],[2,3],[3,3],[16,3],[17,3],[7,3],[8,3],[9,3],[10,3],[11,3],[12,3],[7,5],[8,5],[9,5],[10,5],[11,5],[12,5],[2,6],[3,6],[4,6],[5,6],[14,6],[15,6],[16,6],[17,6],[2,9],[4,9],[5,9],[6,9],[12,9],[13,9],[14,9],[17,9],[2,10],[17,10],[2,11],[3,11],[4,11],[5,11],[14,11],[15,11],[16,11],[17,11]]];
  walls[(n-1)%walls.length].forEach(([c,r])=>{if(m[r]&&m[r][c]===TILE_EMPTY)m[r][c]=TILE_WALL;});
  const bricks=[[[2,8],[3,8],[4,8],[15,8],[16,8],[17,8],[7,5],[8,5],[9,5],[10,5],[11,5],[12,5],[7,10],[8,10],[9,10],[10,10],[11,10],[12,10],[4,14],[5,14],[13,14],[14,14]],[[7,3],[8,3],[11,3],[12,3],[7,7],[8,7],[9,7],[10,7],[7,10],[8,10],[9,10],[10,10],[2,8],[3,8],[15,8],[16,8],[2,13],[3,13],[15,13],[16,13]],[[2,3],[3,3],[15,3],[16,3],[2,5],[3,5],[15,5],[16,5],[8,2],[9,2],[10,2],[8,14],[9,14],[10,14],[2,10],[3,10],[15,10],[16,10]],[[7,13],[8,13],[9,13],[10,13],[11,13],[12,13],[7,8],[8,8],[11,8],[12,8],[4,2],[5,2],[13,2],[14,2],[4,14],[5,14],[13,14],[14,14],[2,7],[16,7]],[[4,4],[5,4],[13,4],[14,4],[11,4],[12,4],[7,6],[8,6],[3,10],[4,10],[14,10],[15,10],[1,8],[2,8],[16,8],[17,8],[10,12],[11,12],[12,12],[13,13],[14,13],[15,13]],[[4,3],[5,3],[13,3],[14,3],[9,2],[10,2],[7,4],[11,4],[2,14],[3,14],[15,14],[16,14],[7,11],[8,11],[9,11],[10,11],[7,13],[8,13],[9,13],[10,13],[11,13],[12,13]]];
  bricks[(n-1)%bricks.length].forEach(([c,r])=>{if(m[r]&&m[r][c]===TILE_EMPTY)m[r][c]=TILE_BRICK;});
  for(let r=12;r<=13;r++){for(let c=8;c<=11;c++){if(m[r][c]===TILE_BRICK||m[r][c]===TILE_WALL)m[r][c]=TILE_EMPTY;}}
  return m;
}

// ---- COLLISION ----
function tileAt(px,py){const r=Math.floor(py/TILE),c=Math.floor(px/TILE);if(r<0||r>=ROWS||c<0||c>=COLS)return TILE_STEEL;return map[r][c];}
function solidTile(t){return t===TILE_BRICK||t===TILE_STEEL||t===TILE_BASE||t===TILE_WALL;}
function rectsOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function rectCollidesMap(r){return solidTile(tileAt(r.x+2,r.y+2))||solidTile(tileAt(r.x+r.w-2,r.y+2))||solidTile(tileAt(r.x+2,r.y+r.h-2))||solidTile(tileAt(r.x+r.w-2,r.y+r.h-2));}
function bulletHitsMap(bullet){const col=Math.floor((bullet.x+bullet.w/2)/TILE),row=Math.floor((bullet.y+bullet.h/2)/TILE);if(row<0||row>=ROWS||col<0||col>=COLS)return{hit:true,type:TILE_STEEL,col,row};const t=map[row][col];if(solidTile(t))return{hit:true,type:t,col,row};return{hit:false,type:TILE_EMPTY,col,row};}

// ---- CLASSES ----
class Tank{constructor(x,y,dir,color,isPlayer=false,enemyType=null){this.x=x;this.y=y;this.w=TILE-4;this.h=TILE-4;this.dir=dir;this.color=color;this.speed=isPlayer?2.5:1.2;this.isPlayer=isPlayer;this.shootCooldown=0;this.shootDelay=isPlayer?20:80;this.active=true;this.aiDirTimer=0;this.aiShootTimer=0;this.invincibleUntil=0;this.maxBullets=1;this.hp=1;this.maxHp=1;this.xpValue=100;this.enemyType=enemyType;}
  getRect(){const s=this.enemyType?this.enemyType.size:1;const dw=(this.w*s-this.w)/2,dh=(this.h*s-this.h)/2;return{x:this.x-dw,y:this.y-dh,w:this.w*s,h:this.h*s};}
  isInvincible(){return this.invincibleUntil>Date.now();}
  move(dir){this.dir=dir;const spd=this.isPlayer&&speedBoostTimer>0?this.speed*2:this.speed;const nx=this.x+dx[dir]*spd,ny=this.y+dy[dir]*spd;const cx=Math.max(0,Math.min(nx,canvas.width-this.w));const cy=Math.max(0,Math.min(ny,canvas.height-this.h));
    const s=this.enemyType?this.enemyType.size:1;const bigTr={x:cx-(this.w*s-this.w)/2,y:cy-(this.h*s-this.h)/2,w:this.w*s,h:this.h*s};
    if(!rectCollidesMap(bigTr)){const all=this.isPlayer?enemies:[player,...enemies.filter(e=>e!==this&&e.active)];if(!all.filter(t=>t&&t.active).some(t=>rectsOverlap(bigTr,t.getRect()))){this.x=cx;this.y=cy;}return;}
    if(dir===DIR_UP||dir===DIR_DOWN){const s2={x:this.x-(this.w*s-this.w)/2,y:cy-(this.h*s-this.h)/2,w:this.w*s,h:this.h*s};if(!rectCollidesMap(s2))this.y=cy;}
    else{const s2={x:cx-(this.w*s-this.w)/2,y:this.y-(this.h*s-this.h)/2,w:this.w*s,h:this.h*s};if(!rectCollidesMap(s2))this.x=cx;}
  }
  shoot(){if(this.shootCooldown>0)return null;const delay=this.isPlayer&&rapidFireTimer>0?Math.floor(this.shootDelay/2):this.shootDelay;this.shootCooldown=delay;const ret=[];const n=this.maxBullets;const offsets=n===1?[0]:n===2?[-4,4]:[-6,0,6];for(const off of offsets){let bx=this.x+this.w/2-3,by=this.y+this.h/2-3;if(this.dir===DIR_UP){by=this.y-6;bx+=off;}else if(this.dir===DIR_DOWN){by=this.y+this.h;bx+=off;}else if(this.dir===DIR_LEFT){bx=this.x-6;by+=off;}else if(this.dir===DIR_RIGHT){bx=this.x+this.w;by+=off;}ret.push(new Bullet(bx,by,this.dir,this.isPlayer));}return ret;}
  update(){if(this.shootCooldown>0)this.shootCooldown--;}
  draw(ctx){ctx.save();const cx=this.x+this.w/2,cy=this.y+this.h/2;ctx.translate(cx,cy);ctx.rotate([0,Math.PI/2,Math.PI,-Math.PI/2][this.dir]);if(this.isPlayer&&this.isInvincible()){ctx.shadowColor='#00ffff';ctx.shadowBlur=12+Math.sin(Date.now()/80)*6;}
    const s=this.enemyType?this.enemyType.size:1;const bw=this.w*s,bh=this.h*s;
    ctx.fillStyle=this.color;ctx.fillRect(-bw/2,-bh/2,bw,bh);
    if(this.enemyType&&this.enemyType.id==='heavy'){ctx.fillStyle='#1a1a1a';ctx.fillRect(-bw/2+2,-bh/2+2,4,bh-4);ctx.fillRect(bw/2-6,-bh/2+2,4,bh-4);}
    ctx.fillStyle='#1a1a1a';ctx.fillRect(-bw/2-2,-bh/2,4,bh);ctx.fillRect(bw/2-2,-bh/2,4,bh);
    ctx.strokeStyle='#444';ctx.lineWidth=1;for(let i=0;i<4;i++){const ty=-bh/2+4+i*7;ctx.beginPath();ctx.moveTo(-bw/2-2,ty);ctx.lineTo(-bw/2+2,ty);ctx.moveTo(bw/2-2,ty);ctx.lineTo(bw/2+2,ty);ctx.stroke();}
    ctx.fillStyle=this.isPlayer?'#66ff66':'#ff9999';ctx.fillRect(-3,-bh/2-10,6,14);
    if(!this.isPlayer&&this.enemyType&&this.enemyType.id!=='normal'){ctx.fillStyle='#fff';ctx.font='bold 9px "Courier New"';ctx.textAlign='center';ctx.fillText(this.enemyType.label,0,-bh/2-12);}
    if(!this.isPlayer&&this.maxHp>1){const hpW=bw*0.8,hpH=3;ctx.fillStyle='#333';ctx.fillRect(-hpW/2,-bh/2-5,hpW,hpH);const ratio=this.hp/this.maxHp;ctx.fillStyle=ratio>0.5?'#2ecc71':ratio>0.25?'#f39c12':'#e74c3c';ctx.fillRect(-hpW/2,-bh/2-5,hpW*ratio,hpH);}
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();ctx.restore();}
}
class Bullet{constructor(x,y,dir,fromPlayer){this.x=x;this.y=y;this.w=6;this.h=6;this.dir=dir;this.speed=5;this.fromPlayer=fromPlayer;this.active=true;}getRect(){return{x:this.x,y:this.y,w:this.w,h:this.h};}update(){this.x+=dx[this.dir]*this.speed;this.y+=dy[this.dir]*this.speed;if(this.x<-10||this.x>canvas.width+10||this.y<-10||this.y>canvas.height+10)this.active=false;}draw(ctx){ctx.fillStyle=this.fromPlayer?'#ffff44':'#ff6666';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=4;ctx.fillRect(this.x,this.y,this.w,this.h);ctx.shadowBlur=0;}}
class Explosion{constructor(x,y,big=false){this.x=x;this.y=y;this.life=big?20:12;this.maxLife=this.life;}update(){this.life--;}get active(){return this.life>0;}draw(ctx){const p=1-this.life/this.maxLife;const r=(this.maxLife>15?28:18)*p;const a=1-p;ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(this.x,this.y,r*0.6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(this.x,this.y,r*0.3,0,Math.PI*2);ctx.fill();ctx.restore();}}
class FloatingText{constructor(x,y,text,color,duration=150){this.x=x;this.y=y;this.text=text;this.color=color;this.life=duration;this.maxLife=duration;}update(){this.life--;this.y-=0.5;}get active(){return this.life>0;}draw(ctx){const p=this.life/this.maxLife;const alpha=p<0.25?p/0.25:1;const scale=1+(1-p)*0.6;const wobble=Math.sin(Date.now()/150)*3*(1-p);ctx.save();ctx.globalAlpha=alpha*0.9;ctx.translate(this.x+wobble,this.y);ctx.scale(scale,scale);ctx.shadowColor='#44ff44';ctx.shadowBlur=20;ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=4;ctx.font='bold 56px "Microsoft YaHei","SimHei","PingFang SC",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.strokeText(this.text,0,0);const grad=ctx.createLinearGradient(0,-28,0,28);grad.addColorStop(0,'#aaffaa');grad.addColorStop(0.5,'#44ff44');grad.addColorStop(1,'#22cc22');ctx.fillStyle=grad;ctx.shadowBlur=8;ctx.fillText(this.text,0,0);ctx.restore();}}
class Powerup{constructor(x,y,type){this.x=x;this.y=y;this.w=24;this.h=24;this.type=type;this.life=600;}getRect(){return{x:this.x,y:this.y,w:this.w,h:this.h};}update(){this.life--;}get active(){return this.life>0;}draw(ctx){const alpha=this.life<120?this.life/120:1;const pulse=1+Math.sin(Date.now()/200)*0.15;ctx.save();ctx.globalAlpha=alpha;ctx.translate(this.x+this.w/2,this.y+this.h/2);ctx.scale(pulse,pulse);ctx.fillStyle=this.type.color;ctx.shadowColor=this.type.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(0,0,this.w/2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.type.label,0,1);ctx.restore();}}

// ---- HELPERS ----
function createExplosion(x,y,big=false){explosions.push(new Explosion(x+TILE/2,y+TILE/2,big));}
function spawnPowerupAt(x,y){if(Math.random()>0.2)return;powerups.push(new Powerup(x,y,randomPowerupType()));}
function spawnPowerup(col,row){if(Math.random()>0.18)return;powerups.push(new Powerup(col*TILE+4,row*TILE+4,randomPowerupType()));}
function destroyTile(col,row){if(row<0||row>=ROWS||col<0||col>=COLS)return'none';const t=map[row][col];if(t===TILE_BRICK){map[row][col]=TILE_EMPTY;spawnPowerup(col,row);return'brick';}if(t===TILE_BASE){map[row][col]=TILE_EMPTY;return'base';}if(t===TILE_STEEL)return'steel';return'none';}
function createPlayer(){const lv=playerUpgrade;let sy=TILE*13+2,sx=TILE*9+2;for(let i=0;i<6;i++){const tr={x:sx,y:sy,w:TILE-4,h:TILE-4};if(!rectCollidesMap(tr))break;sy-=TILE;}const p=new Tank(sx,sy,DIR_UP,UPGRADE_COLORS[lv-1],true);p.invincibleUntil=Date.now()+3000;p.speed=2.5+(lv-1)*0.4;p.shootDelay=Math.max(8,20-(lv-1)*2);p.maxBullets=lv>=6?3:lv>=3?2:1;return p;}
function onBaseDestroyed(){lives--;loseUpgrade();updateUI();if(lives<=0){gameOver=true;gameRunning=false;return;}baseRegenTimer=90;player.active=false;createExplosion(player.x,player.y,true);floatingTexts.push(new FloatingText(player.x+player.w/2,player.y,'菜','#44ff44'));setTimeout(()=>{if(!gameOver){player=createPlayer();}},1000);}

// ---- ENEMY AI ----
function updateEnemyAI(enemy){if(!enemy.active)return null;if(freezeTimer>0)return null;enemy.aiShootTimer++;enemy.aiDirTimer--;if(enemy.aiDirTimer<=0){if(Math.random()<0.5&&player&&player.active){const a=Math.atan2(player.y+player.h/2-(enemy.y+enemy.h/2),player.x+player.w/2-(enemy.x+enemy.w/2));enemy.dir=Math.abs(Math.cos(a))>Math.abs(Math.sin(a))?(Math.cos(a)>0?DIR_RIGHT:DIR_LEFT):(Math.sin(a)>0?DIR_DOWN:DIR_UP);}else{enemy.dir=Math.floor(Math.random()*4);}enemy.aiDirTimer=30+Math.floor(Math.random()*70);}enemy.move(enemy.dir);if(enemy.aiShootTimer>enemy.shootDelay+Math.random()*60&&player&&player.active){enemy.aiShootTimer=0;return enemy.shoot();}return null;}
function spawnEnemy(){if(totalEnemiesSpawned>=enemiesPerLevel||enemies.filter(e=>e.active).length>=maxEnemiesOnScreen)return;
  const sps=[{x:TILE*3+2,y:TILE*1+2},{x:TILE*9+2,y:TILE*1+2},{x:TILE*15+2,y:TILE*1+2},{x:TILE*1+2,y:TILE*5+2},{x:TILE*1+2,y:TILE*9+2},{x:TILE*18+2,y:TILE*5+2},{x:TILE*18+2,y:TILE*9+2}];
  const valid=sps.filter(sp=>!rectCollidesMap({x:sp.x,y:sp.y,w:TILE-4,h:TILE-4}));if(valid.length===0)return;
  const sp=valid[Math.floor(Math.random()*valid.length)];const type=pickEnemyType();const s=type.size;
  const halfExtra=((TILE-4)*s-(TILE-4))/2;const sx=sp.x-halfExtra,sy=sp.y-halfExtra;const bw=(TILE-4)*s,bh=(TILE-4)*s;
  const bigTr={x:sx,y:sy,w:bw,h:bh};if(rectCollidesMap(bigTr))return;if([player,...enemies].filter(t=>t&&t.active).some(t=>rectsOverlap(bigTr,t.getRect())))return;
  const e=new Tank(sx,sy,DIR_DOWN,type.color,false,type);e.hp=type.hp;e.maxHp=type.hp;e.speed=type.speed+level*0.08+Math.random()*0.3;e.shootDelay=Math.max(20,type.shootDelay-level*4);e.xpValue=type.xp;enemies.push(e);totalEnemiesSpawned++;enemiesRemaining=enemiesPerLevel-totalEnemiesSpawned;updateUI();}

// ---- RESET / LEVELS ----
function resetGame(){score=0;lives=3;level=1;playerUpgrade=1;xp=0;enemiesPerLevel=20;totalEnemiesSpawned=0;enemiesRemaining=20;gameOver=false;gameRunning=true;gamePaused=false;enemies=[];bullets=[];explosions=[];powerups=[];floatingTexts=[];enemySpawnTimer=0;freezeTimer=0;speedBoostTimer=0;rapidFireTimer=0;baseRegenTimer=0;map=getLevelMap(level);player=createPlayer();updateUI();}
function nextLevel(){level++;enemiesPerLevel=16+level*4;totalEnemiesSpawned=0;enemiesRemaining=enemiesPerLevel;maxEnemiesOnScreen=Math.min(6,4+Math.floor((level-1)/2));enemySpawnInterval=Math.max(50,120-level*8);enemies=[];bullets=[];powerups=[];explosions=[];floatingTexts=[];enemySpawnTimer=0;freezeTimer=0;speedBoostTimer=0;rapidFireTimer=0;baseRegenTimer=0;map=getLevelMap(level);player=createPlayer();updateUI();}

function updateUI(){
  document.getElementById('score').textContent=score;document.getElementById('remaining').textContent=enemiesRemaining;
  document.getElementById('level').textContent=level;document.getElementById('livesDisplay').textContent=Array.from({length:Math.max(0,lives)},()=>'🛡️').join(' ');
  const upEl=document.getElementById('upgradeDisplay');upEl.textContent='Lv'+playerUpgrade;upEl.style.color=UPGRADE_COLORS[playerUpgrade-1];
  const cur=xpForLevel(playerUpgrade),nxt=xpToNext(playerUpgrade);document.getElementById('xpBar').style.width=(playerUpgrade>=8?100:Math.floor((xp-cur)/nxt*100))+'%';
  document.getElementById('xpText').textContent=playerUpgrade>=8?'MAX':(xp-cur)+'/'+(cur+nxt);
  const buffEl=document.getElementById('buffIndicator');buffEl.className='buff-indicator';buffEl.textContent='';
  if(freezeTimer>0){buffEl.className+=' buff-freeze active';buffEl.textContent='❄️ 冰冻 '+Math.ceil(freezeTimer/60)+'s';}
  else if(speedBoostTimer>0){buffEl.className+=' buff-speed active';buffEl.textContent='⚡ 加速 '+Math.ceil(speedBoostTimer/60)+'s';}
  else if(rapidFireTimer>0){buffEl.className+=' buff-rapid active';buffEl.textContent='🔥 速射 '+Math.ceil(rapidFireTimer/60)+'s';}
  else if(player&&player.active&&player.isInvincible()&&!gameOver){const sec=Math.ceil((player.invincibleUntil-Date.now())/1000);if(sec>0){buffEl.className+=' buff-shield active';buffEl.textContent='🛡️ 护盾 '+sec+'s';}}
  const msgEl=document.getElementById('statusMsg');
  if(gameOver&&lives<=0){msgEl.textContent='游戏结束！点画面重新开始';msgEl.style.color='#e94560';}
  else if(gameOver){msgEl.textContent='胜利！点画面重新开始';msgEl.style.color='#4ecdc4';}
  else if(gamePaused){msgEl.textContent='已暂停 - 点击/Enter继续';msgEl.style.color='#f5c518';}
  else{msgEl.textContent='';}
}
function applyPowerup(type){switch(type.id){case'life':if(lives<5)lives++;break;case'shield':if(player&&player.active)player.invincibleUntil=Date.now()+3000;break;case'freeze':freezeTimer=360;break;case'speed':speedBoostTimer=540;break;case'rapid':rapidFireTimer=540;break;}updateUI();}

// ---- MAIN LOOP ----
function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
function update(){
  if(!gameRunning||gamePaused||gameOver)return;
  if(freezeTimer>0)freezeTimer--;if(speedBoostTimer>0)speedBoostTimer--;if(rapidFireTimer>0)rapidFireTimer--;
  if(baseRegenTimer>0){baseRegenTimer--;if(baseRegenTimer===0)regenerateBase();}

  // Player input: keyboard OR touch
  if(player&&player.active){
    let moved=false;
    if(keys['ArrowUp']||keys['w']){player.move(DIR_UP);moved=true;}
    else if(keys['ArrowDown']||keys['s']){player.move(DIR_DOWN);moved=true;}
    else if(keys['ArrowLeft']||keys['a']){player.move(DIR_LEFT);moved=true;}
    else if(keys['ArrowRight']||keys['d']){player.move(DIR_RIGHT);moved=true;}
    else if(touchDir!==null){player.move(touchDir);moved=true;}
    if(keys[' ']||touchShooting){const r=player.shoot();if(r){if(Array.isArray(r))bullets.push(...r);else bullets.push(r);}}
    player.update();
    for(let i=powerups.length-1;i>=0;i--){if(powerups[i].active&&rectsOverlap(player.getRect(),powerups[i].getRect())){applyPowerup(powerups[i].type);powerups.splice(i,1);}}
  }

  enemySpawnTimer++;if(enemySpawnTimer>=enemySpawnInterval&&enemies.filter(e=>e.active).length<maxEnemiesOnScreen&&totalEnemiesSpawned<enemiesPerLevel){enemySpawnTimer=0;spawnEnemy();}
  enemies.forEach(enemy=>{if(!enemy.active)return;enemy.update();const r=updateEnemyAI(enemy);if(r){if(Array.isArray(r))bullets.push(...r);else bullets.push(r);}});
  powerups.forEach(p=>p.update());
  bullets.forEach(bullet=>{if(!bullet.active)return;bullet.update();
    const mapHit=bulletHitsMap(bullet);if(mapHit.hit){bullet.active=false;const result=destroyTile(mapHit.col,mapHit.row);
      if(result==='brick')createExplosion(mapHit.col*TILE,mapHit.row*TILE,false);
      else if(result==='base'){createExplosion(mapHit.col*TILE,mapHit.row*TILE,true);onBaseDestroyed();}
      else if(result==='steel')createExplosion(mapHit.col*TILE,mapHit.row*TILE,false);return;
    }
    if(bullet.fromPlayer){enemies.forEach(enemy=>{if(!enemy.active||!bullet.active)return;if(rectsOverlap(bullet.getRect(),enemy.getRect())){bullet.active=false;enemy.hp--;if(enemy.hp<=0){enemy.active=false;createExplosion(enemy.x+enemy.w/2,enemy.y+enemy.h/2,true);score+=100;addXP(enemy.xpValue);spawnPowerupAt(enemy.x+enemy.w/2,enemy.y+enemy.h/2);}else{createExplosion(enemy.x+enemy.w/2,enemy.y+enemy.h/2,false);}updateUI();}});
    }else{if(player&&player.active&&bullet.active&&rectsOverlap(bullet.getRect(),player.getRect())){if(player.isInvincible()){bullet.active=false;return;}bullet.active=false;player.active=false;createExplosion(player.x,player.y,true);floatingTexts.push(new FloatingText(player.x+player.w/2,player.y,'菜','#44ff44'));lives--;loseUpgrade();updateUI();if(lives<=0){gameOver=true;gameRunning=false;}else{setTimeout(()=>{if(!gameOver)player=createPlayer();},1000);}}}});
  for(let i=0;i<bullets.length;i++){for(let j=i+1;j<bullets.length;j++){if(bullets[i].active&&bullets[j].active&&bullets[i].fromPlayer!==bullets[j].fromPlayer&&rectsOverlap(bullets[i].getRect(),bullets[j].getRect())){bullets[i].active=false;bullets[j].active=false;createExplosion(bullets[i].x,bullets[i].y,false);}}}
  if(player&&player.active&&player.isInvincible()){enemies.forEach(enemy=>{if(!enemy.active)return;if(rectsOverlap(player.getRect(),enemy.getRect())){enemy.hp--;if(enemy.hp<=0){enemy.active=false;createExplosion(enemy.x,enemy.y,true);score+=100;addXP(enemy.xpValue);spawnPowerupAt(enemy.x+enemy.w/2,enemy.y+enemy.h/2);}else{createExplosion(enemy.x+enemy.w/2,enemy.y+enemy.h/2,false);}updateUI();}});}
  floatingTexts.forEach(f=>f.update());
  bullets=bullets.filter(b=>b.active);enemies=enemies.filter(e=>e.active);explosions=explosions.filter(e=>e.active);powerups=powerups.filter(p=>p.active);floatingTexts=floatingTexts.filter(f=>f.active);
  if(totalEnemiesSpawned>=enemiesPerLevel&&enemies.filter(e=>e.active).length===0&&gameRunning&&!gameOver){score+=500;if(level>=6){gameRunning=false;gameOver=true;document.getElementById('statusMsg').textContent='恭喜通关！按 Enter 重新开始';document.getElementById('statusMsg').style.color='#4ecdc4';updateUI();}else nextLevel();}
  if(gameRunning&&(freezeTimer>0||speedBoostTimer>0||rapidFireTimer>0))updateUI();
}

function drawMap(){for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){const t=map[r][c],x=c*TILE,y=r*TILE;
  if(t===TILE_BRICK){ctx.fillStyle='#b5651d';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#7a3b10';ctx.fillRect(x+1,y+1,TILE/2-2,TILE/2-2);ctx.fillRect(x+TILE/2+1,y+TILE/2+1,TILE/2-2,TILE/2-2);ctx.strokeStyle='#5c2d0a';ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,TILE-1,TILE-1);}
  else if(t===TILE_WALL){ctx.fillStyle='#8b5e3c';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#6b3f1f';ctx.fillRect(x+1,y+1,TILE/2-2,TILE/2-2);ctx.fillRect(x+TILE/2+1,y+TILE/2+1,TILE/2-2,TILE/2-2);ctx.fillStyle='#5c3a1e';ctx.fillRect(x+TILE/2-3,y+2,6,TILE-4);ctx.fillRect(x+2,y+TILE/2-3,TILE-4,6);ctx.strokeStyle='#4a2a10';ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,TILE-1,TILE-1);}
  else if(t===TILE_STEEL){ctx.fillStyle='#6b7280';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#9ca3af';ctx.fillRect(x+2,y+2,TILE-4,TILE-4);ctx.fillStyle='#4b5563';ctx.fillRect(x+4,y+4,TILE-8,TILE-8);}
  else if(t===TILE_BASE){ctx.fillStyle='#1a1a2e';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#e94560';ctx.beginPath();ctx.moveTo(x+6,y+6);ctx.lineTo(x+TILE-6,y+TILE/2);ctx.lineTo(x+6,y+TILE-6);ctx.closePath();ctx.fill();}}}
}

function draw(){ctx.fillStyle='#111118';ctx.fillRect(0,0,canvas.width,canvas.height);drawMap();
  if(baseRegenTimer>0){const bx=9*TILE,by=(ROWS-2)*TILE;ctx.strokeStyle='rgba(233,69,96,'+(0.4+Math.sin(Date.now()/150)*0.3)+')';ctx.lineWidth=2;ctx.strokeRect(bx-4,by-4,TILE*2+8,TILE+8);ctx.fillStyle='rgba(233,69,96,0.5)';ctx.font='bold 12px "Courier New"';ctx.textAlign='center';ctx.fillText('修复中...',bx+TILE,by-8);ctx.textAlign='start';}
  enemies.forEach(e=>{if(e.active){if(freezeTimer>0){ctx.save();ctx.globalAlpha=0.5;e.draw(ctx);ctx.restore();}else e.draw(ctx);}});
  if(player&&player.active){if(player.isInvincible()&&Math.floor(Date.now()/100)%2===0)player.draw(ctx);else if(!player.isInvincible())player.draw(ctx);}
  bullets.forEach(b=>b.draw(ctx));explosions.forEach(e=>e.draw(ctx));powerups.forEach(p=>p.draw(ctx));floatingTexts.forEach(f=>f.draw(ctx));
  if(player&&player.active&&player.isInvincible()){const rem=(player.invincibleUntil-Date.now())/3000;ctx.fillStyle='#00ffff';ctx.fillRect(player.x,player.y-6,player.w*Math.max(0,rem),3);}
  if(gamePaused&&!gameOver){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,canvas.width,canvas.height);}
  if(!gameRunning&&!gameOver&&!gamePaused){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='bold 22px "Courier New"';ctx.textAlign='center';ctx.fillText('按Enter 或 点击画面 开始',canvas.width/2,canvas.height/2+60);ctx.textAlign='start';}
  if(gameOver){ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fff';ctx.font='bold 40px "Courier New"';ctx.textAlign='center';if(lives<=0)ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-20);else ctx.fillText('YOU WIN!',canvas.width/2,canvas.height/2-20);ctx.font='16px "Courier New"';ctx.fillText('按 Enter 重新开始',canvas.width/2,canvas.height/2+30);ctx.textAlign='start';}
  if(gamePaused&&!gameOver){ctx.fillStyle='#f5c518';ctx.font='bold 36px "Courier New"';ctx.textAlign='center';ctx.fillText('PAUSED',canvas.width/2,canvas.height/2);ctx.textAlign='start';}
}

map=getLevelMap(1);player=createPlayer();updateUI();gameLoop();
</script>
