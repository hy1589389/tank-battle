<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache">
<title>坦克大战 - Tank Battle v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0;background:#1a1a2e;font-family:'Courier New','Microsoft YaHei',monospace;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;overscroll-behavior:none;-webkit-user-drag:none;}
body{display:flex;justify-content:center;align-items:center;}

/* Mode / Lobby overlays */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;color:#fff;}
.overlay h1{font-size:36px;color:#f5c518;letter-spacing:6px;text-shadow:0 0 20px rgba(245,197,24,0.5);}
.overlay .subtitle{font-size:14px;color:#8a8a8a;letter-spacing:2px;margin-top:-16px;}
.overlay .back{color:#8a8a8a;font-size:14px;cursor:pointer;padding:8px;position:absolute;top:16px;left:16px;}
.overlay .back:hover{color:#fff;}
.btn{background:#0f3460;border:2px solid #1a5276;color:#fff;font-size:18px;padding:14px 40px;border-radius:8px;cursor:pointer;letter-spacing:2px;font-family:inherit;transition:all .2s;min-width:200px;text-align:center;}
.btn:hover{background:#1a5276;border-color:#2980b9;}
.btn.primary{background:#c0392b;border-color:#e74c3c;}
.btn.primary:hover{background:#e74c3c;}
.btn.green{background:#27ae60;border-color:#2ecc71;}
.btn.green:hover{background:#2ecc71;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.input{background:#0a0a1e;border:2px solid #1a5276;color:#fff;font-size:16px;padding:12px 16px;border-radius:8px;text-align:center;letter-spacing:2px;font-family:inherit;width:200px;text-transform:uppercase;}
.input::placeholder{color:#444;text-transform:none;letter-spacing:1px;}
.code{font-size:48px;color:#f5c518;letter-spacing:12px;font-weight:bold;text-shadow:0 0 15px rgba(245,197,24,0.4);}
.player-list{display:flex;flex-direction:column;gap:8px;min-width:250px;max-height:200px;overflow-y:auto;}
.player-row{display:flex;align-items:center;gap:12px;padding:8px 16px;background:#16213e;border-radius:8px;font-size:14px;}
.player-dot{width:14px;height:14px;border-radius:50%;}
.hint{color:#5a5a8a;font-size:12px;text-align:center;max-width:300px;line-height:1.6;}
.error{color:#e74c3c;font-size:13px;min-height:20px;}

/* Game */
.game-wrapper{display:flex;gap:20px;align-items:stretch;}
.side-panel{background:#16213e;border:3px solid #0f3460;border-radius:12px;padding:18px 22px;color:#e94560;display:flex;flex-direction:column;justify-content:flex-start;gap:12px;min-width:185px;max-width:195px;position:relative;}
.side-panel h2{font-size:20px;text-align:center;letter-spacing:3px;color:#f5c518;text-shadow:0 0 10px rgba(245,197,24,0.5);margin-bottom:0;}
.stat{text-align:center;}
.stat-label{font-size:11px;color:#8a8a8a;letter-spacing:2px;text-transform:uppercase;}
.stat-value{font-size:30px;font-weight:bold;color:#fff;}
.enemy-count{color:#e94560;}
.xp-bar-outer{width:100%;height:8px;background:#1a1a3e;border-radius:4px;overflow:hidden;}
.xp-bar-inner{height:100%;background:linear-gradient(90deg,#f5c518,#ff9500);border-radius:4px;transition:width 0.3s;}
.buff-indicator{font-size:11px;padding:4px 8px;border-radius:4px;text-align:center;visibility:hidden;border:1px solid transparent;animation:pulse 0.5s infinite alternate;white-space:nowrap;line-height:1.3;}
.buff-indicator.active{visibility:visible;}
.buff-shield{background:rgba(0,200,255,0.2);color:#00c8ff;border-color:#00c8ff;}
.buff-speed{background:rgba(255,200,0,0.2);color:#ffc800;border-color:#ffc800;}
.buff-rapid{background:rgba(255,100,0,0.2);color:#ff6400;border-color:#ff6400;}
.buff-freeze{background:rgba(100,200,255,0.2);color:#64c8ff;border-color:#64c8ff;}
@keyframes pulse{from{opacity:1}to{opacity:0.5}}
canvas{border:3px solid #0f3460;border-radius:8px;image-rendering:pixelated;background:#0a0a0a;display:block;}
.controls-info{text-align:center;font-size:10px;color:#5a5a8a;line-height:1.6;display:block;}
.controls-info span{color:#f5c518;}
.status-msg{text-align:center;font-size:12px;font-weight:bold;min-height:18px;letter-spacing:1px;}
.divider{border-top:1px solid #0f3460;}
.touch-controls{display:none;position:fixed;bottom:0;left:0;right:0;height:220px;pointer-events:none;z-index:10;}
.touch-joystick{position:absolute;bottom:30px;left:20px;width:110px;height:110px;pointer-events:auto;}
.touch-joystick .base{width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,0.08);border:3px solid rgba(255,255,255,0.2);position:relative;}
.touch-joystick .thumb{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.4);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:transform 0.05s;}
.touch-shoot{position:absolute;bottom:45px;right:30px;width:100px;height:100px;border-radius:50%;background:rgba(255,60,60,0.18);border:3px solid rgba(255,60,60,0.5);pointer-events:auto;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;color:rgba(255,255,255,0.85);letter-spacing:2px;}
.touch-shoot:active{background:rgba(255,60,60,0.4);}
#mobileHint{display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:12px;z-index:5;pointer-events:none;}

@media(min-width:769px){
  .side-panel{display:flex;}.controls-info{display:block;}.touch-controls{display:none!important;}#mobileHint{display:none!important;}
}
@media(max-width:768px){
  body{align-items:flex-start;padding-top:8px;}
  .game-wrapper{flex-direction:column;align-items:center;gap:6px;}
  .side-panel{flex-direction:row;flex-wrap:nowrap;justify-content:space-around;align-items:center;gap:2px;min-width:auto;max-width:95vw;padding:6px 6px 26px;border-radius:8px;border-width:2px;position:relative;min-height:70px;}
  .side-panel h2{display:none;}.side-panel .divider{display:none;}.controls-info{display:none;}.status-msg{width:100%;}
  .side-panel .stat{margin:0;flex:1 1 0;padding:0 2px;text-align:center;}
  .stat-value{font-size:18px;white-space:nowrap;overflow:hidden;}
  .side-panel .stat:last-of-type{flex:1.5 1.5 0;}
  .side-panel .status-msg{display:none;}
  canvas{max-width:96vw;max-height:52vh;border-width:2px;width:auto;height:auto;}
  #mobileHint{display:block;}.touch-controls{display:block;}
  .buff-indicator{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-size:10px;padding:2px 8px;white-space:nowrap;z-index:5;}
  #livesDisplay{display:block;text-align:center;white-space:nowrap;min-width:95px;}
  .xp-bar-outer{width:80px;height:5px;}.xp-bar-inner{height:5px;}
  .overlay h1{font-size:26px;}.code{font-size:36px;}.btn{font-size:16px;padding:12px 28px;}
}
</style>
</head>
<body>

<!-- ====== MODE SELECT SCREEN ====== -->
<div class="overlay" id="modeScreen">
  <h1>坦 克 大 战</h1>
  <div class="subtitle">TANK BATTLE</div>
  <button class="btn green" onclick="startSinglePlayer()">🎮 单人模式</button>
  <button class="btn primary" onclick="showLobby()">🌐 联机模式</button>
  <div class="hint">联机模式需要一台电脑运行服务器<br>同一 WiFi 下的玩家用浏览器加入</div>
</div>

<!-- ====== LOBBY SCREEN ====== -->
<div class="overlay" id="lobbyScreen" style="display:none">
  <div class="back" onclick="backToMode()">← 返回</div>
  <h1 style="font-size:24px">🌐 局 域 网 对 战</h1>

  <!-- Lobby choice: host or join? -->
  <div id="lobbyChoice" style="display:flex;flex-direction:column;align-items:center;gap:16px;">
    <button class="btn green" onclick="createRoom()">🏠 创建房间</button>
    <div class="subtitle">— 或 —</div>
    <input class="input" type="text" id="roomCodeInput" placeholder="输入4位房间码" maxlength="4" autocomplete="off" spellcheck="false" autocomplete="off">
    <button class="btn" onclick="joinRoom()">🚪 加入房间</button>
    <div class="error" id="lobbyError"></div>
  </div>

  <!-- Host view (after room created) -->
  <div id="hostView" style="display:none;flex-direction:column;align-items:center;gap:16px;">
    <div class="subtitle">把房间码发给朋友</div>
    <div class="code" id="roomCodeDisplay">----</div>
    <div class="subtitle">房间码</div>
    <div class="player-list" id="hostPlayerList"></div>
    <button class="btn green" id="startBtn" disabled onclick="startMultiGame()">开始游戏（需 2+ 人）</button>
    <div class="error" id="hostError"></div>
  </div>

  <!-- Join view (after joined) -->
  <div id="joinView" style="display:none;flex-direction:column;align-items:center;gap:16px;">
    <div class="subtitle">已加入房间</div>
    <div class="code" id="joinedRoomCode">----</div>
    <div class="player-list" id="joinPlayerList"></div>
    <div class="hint" id="joinWait">等待主机开始游戏...</div>
    <div class="error" id="joinError"></div>
  </div>
</div>

<!-- ====== GAME UI (hidden initially) ====== -->
<div class="game-wrapper" id="gameWrapper" style="display:none">
  <div class="side-panel">
    <h2 id="panelTitle">坦 克 大 战</h2>
    <div class="stat"><div class="stat-label">得分</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label" id="remainingLabel">敌人</div><div class="stat-value enemy-count" id="remaining">20</div></div>
    <div class="stat"><div class="stat-label">生命</div><div class="stat-value" id="livesDisplay" style="font-size:22px;">🛡️ 🛡️ 🛡️</div></div>
    <div class="stat"><div class="stat-label">关卡</div><div class="stat-value" id="level" style="font-size:24px;">1</div></div>
    <div class="stat" id="xpStat">
      <div class="stat-label">等级 <span id="upgradeDisplay" style="color:#f5c518;">Lv1</span></div>
      <div class="xp-bar-outer"><div class="xp-bar-inner" id="xpBar" style="width:0%"></div></div>
      <div style="font-size:9px;color:#8a8a8a;margin-top:1px;"><span id="xpText">0/300</span></div>
    </div>
    <div class="buff-indicator" id="buffIndicator"></div>
    <div class="status-msg" id="statusMsg">按Enter/点击开始</div>
    <div class="controls-info"><span>↑↓←→</span>移动 <span>空格</span>射击 <span>Enter</span>暂停 <span>R</span>重来</div>
  </div>
  <canvas id="gameCanvas"></canvas>
</div>

<div class="touch-controls" id="touchControls" style="display:none">
  <div class="touch-joystick" id="joystick"><div class="base"></div><div class="thumb" id="joyThumb"></div></div>
  <div class="touch-shoot" id="touchShoot">射击</div>
</div>
<div id="mobileHint">← 摇杆 &nbsp;|&nbsp; 射击 →</div>

<script>
// ==================== SHARED SETUP ====================
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const TILE=32,COLS=20,ROWS=18;canvas.width=COLS*TILE;canvas.height=ROWS*TILE;
const TILE_EMPTY=0,TILE_BRICK=1,TILE_STEEL=2,TILE_BASE=3,TILE_WALL=4;
const DIR_UP=0,DIR_RIGHT=1,DIR_DOWN=2,DIR_LEFT=3;
const dx=[0,1,0,-1],dy=[-1,0,1,0];
const XP_THRESHOLDS=[0,300,700,1300,2200,3600,5500,8000,99999];
const UPGRADE_COLORS=['#4ecdc4','#44bd32','#f39c12','#e67e22','#e74c3c','#9b59b6','#1abc9c','#ecf0f1'];
const PLAYER_COLORS=['#4ecdc4','#e94560','#f5c518','#9b59b6'];

// Game state
let gameMode=''; // 'single' | 'multi-host' | 'multi-join'
let score=0,lives=3,level=1;
let enemiesRemaining=20,enemiesPerLevel=20,totalEnemiesSpawned=0,maxEnemiesOnScreen=3;
let gameRunning=false,gameOver=false,gamePaused=false;
let enemySpawnTimer=0,enemySpawnInterval=90;
let xp=0,playerUpgrade=1;
let freezeTimer=0,speedBoostTimer=0,rapidFireTimer=0;
let baseRegenTimer=0;
let player=null,enemies=[],bullets=[],explosions=[],powerups=[],floatingTexts=[],map=[];
let multiPlayers=[],myPlayerId='',myColor='',remoteInputs={};
let frameCount=0,latestNetworkState=null;
let multiWinner=null,multiScores={};
let sentInputState={dir:-1,shoot:false};

// CONSTANTS
const POWERUP_TYPES={LIFE:{id:'life',label:'💚',color:'#2ecc71',weight:20},SHIELD:{id:'shield',label:'🛡️',color:'#00c8ff',weight:25},FREEZE:{id:'freeze',label:'❄️',color:'#64c8ff',weight:20},SPEED:{id:'speed',label:'⚡',color:'#ffc800',weight:15},RAPID:{id:'rapid',label:'🔥',color:'#ff6400',weight:20}};
const POWERUP_KEYS=['LIFE','SHIELD','FREEZE','SPEED','RAPID'];
const ENEMY_TYPES={NORMAL:{id:'normal',label:'普通',color:'#e94560',hp:2,speed:1.2,shootDelay:55,xp:100,size:1,weight:100},FAST:{id:'fast',label:'快速',color:'#f39c12',hp:1,speed:2.0,shootDelay:45,xp:150,size:1,weight:100},ARMORED:{id:'armored',label:'装甲',color:'#8e44ad',hp:5,speed:0.9,shootDelay:70,xp:350,size:1.15,weight:100},HEAVY:{id:'heavy',label:'重型',color:'#c0392b',hp:8,speed:0.7,shootDelay:90,xp:600,size:1.3,weight:100}};

// ==================== TOUCH ====================
let touchInput=null,touchShooting=false;
function setupTouch(){
  const jb=document.getElementById('joystick'),thumb=document.getElementById('joyThumb'),btn=document.getElementById('touchShoot');
  let jCX=0,jCY=0,drag=false;
  function gi(dx,dy){const d=Math.sqrt(dx*dx+dy*dy);if(d<12)return null;const s=Math.min(1,Math.max(0.3,d/70));const a=Math.atan2(dy,dx);let dir;if(a>-0.785&&a<=0.785)dir=DIR_RIGHT;else if(a>0.785&&a<=2.356)dir=DIR_DOWN;else if(a>2.356||a<=-2.356)dir=DIR_LEFT;else dir=DIR_UP;return{dir,s};}
  jb.addEventListener('touchstart',e=>{e.preventDefault();const r=jb.getBoundingClientRect();jCX=r.left+r.width/2;jCY=r.top+r.height/2;const tx=e.touches[0].clientX-jCX,ty=e.touches[0].clientY-jCY;drag=true;touchInput=gi(tx,ty);const d=Math.sqrt(tx*tx+ty*ty),mr=55,sc=Math.min(d,mr)/(d||1);thumb.style.transform=`translate(calc(-50% + ${tx*sc}px), calc(-50% + ${ty*sc}px))`;},{passive:false});
  jb.addEventListener('touchmove',e=>{e.preventDefault();if(!drag)return;const tx=e.touches[0].clientX-jCX,ty=e.touches[0].clientY-jCY;touchInput=gi(tx,ty);const d=Math.sqrt(tx*tx+ty*ty),mr=55,sc=Math.min(d,mr)/(d||1);thumb.style.transform=`translate(calc(-50% + ${tx*sc}px), calc(-50% + ${ty*sc}px))`;},{passive:false});
  jb.addEventListener('touchend',e=>{e.preventDefault();drag=false;touchInput=null;thumb.style.transform='translate(-50%,-50%)';},{passive:false});
  btn.addEventListener('touchstart',e=>{e.preventDefault();touchShooting=true;},{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();touchShooting=false;},{passive:false});
  btn.addEventListener('touchcancel',e=>{touchShooting=false;});
  canvas.addEventListener('touchstart',e=>{e.preventDefault();if(gameOver)resetGame();else{gamePaused=!gamePaused;if(!gameRunning)gameRunning=true;}updateUI();},{passive:false});
}
setupTouch();
document.addEventListener('touchmove',e=>{e.preventDefault();},{passive:false});
document.addEventListener('gesturestart',e=>{e.preventDefault();},{passive:false});
document.addEventListener('gesturechange',e=>{e.preventDefault();},{passive:false});
document.addEventListener('gestureend',e=>{e.preventDefault();},{passive:false});

// ==================== MODE SELECT ====================
function startSinglePlayer(){
  gameMode='single';
  document.getElementById('modeScreen').style.display='none';
  document.getElementById('gameWrapper').style.display='flex';
  document.getElementById('panelTitle').textContent='坦 克 大 战';
  document.getElementById('remainingLabel').textContent='敌人';
  document.getElementById('xpStat').style.display='';
  document.getElementById('statusMsg').textContent='按Enter/点击开始';
  resetGame();
}
function showLobby(){
  document.getElementById('modeScreen').style.display='none';
  document.getElementById('lobbyScreen').style.display='flex';
  document.getElementById('lobbyChoice').style.display='flex';
  document.getElementById('hostView').style.display='none';
  document.getElementById('joinView').style.display='none';
  document.getElementById('lobbyError').textContent='';
  document.getElementById('hostError').textContent='';
  document.getElementById('joinError').textContent='';
  connectWS();
}
function createRoom(){
  if(!ws||ws.readyState!==1){document.getElementById('lobbyError').textContent='未连接到服务器';return;}
  ws.send(JSON.stringify({type:'create_room',name:'主机'}));
}
function backToMode(){
  document.getElementById('lobbyScreen').style.display='none';
  document.getElementById('modeScreen').style.display='flex';
  if(ws){ws.close();ws=null;}
}

// ==================== WEBSOCKET ====================
let ws=null,roomCode='',isHost=false;

function connectWS(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host);
  ws.onopen=()=>{document.getElementById('lobbyChoice').style.display='flex';};
  ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    switch(m.type){
      case'room_created':roomCode=m.roomCode;myPlayerId=m.playerId;isHost=true;document.getElementById('roomCodeDisplay').textContent=roomCode;document.getElementById('lobbyChoice').style.display='none';document.getElementById('joinView').style.display='none';document.getElementById('hostView').style.display='flex';updateHostPlayers([{id:m.playerId,name:'主机 (你)',color:'#4ecdc4'}]);document.getElementById('hostError').textContent='';break;
      case'joined_room':myPlayerId=m.playerId;isHost=false;roomCode=m.roomCode;document.getElementById('joinedRoomCode').textContent=m.roomCode;document.getElementById('lobbyChoice').style.display='none';document.getElementById('hostView').style.display='none';document.getElementById('joinView').style.display='flex';updateJoinPlayerList(m.players);document.getElementById('joinError').textContent='';document.getElementById('joinWait').style.display='block';break;
      case'player_joined':if(isHost)updateHostPlayersByJoin(m);break;
      case'player_left':if(isHost)removeHostPlayer(m.playerId);else removeJoinPlayer(m.playerId);break;
      case'game_start':startMultiPlayerGame(m);break;
      case'game_state':
        if(gameMode==='multi-host')return;
        if(gameMode!=='multi-join'){gameMode='multi-join';document.getElementById('modeScreen').style.display='none';document.getElementById('lobbyScreen').style.display='none';document.getElementById('gameWrapper').style.display='flex';}
        latestNetworkState=m;
        if(!gameRunning){gameRunning=true;gameOver=false;gamePaused=false;}
        break;
      case'game_over':multiWinner=m.winner;multiScores=m.scores;gameOver=true;gameRunning=false;updateUI();break;
      case'back_to_lobby':resetMultiLobby(m.players);break;
      case'room_closed':if(gameMode.startsWith('multi')){alert('主机断开了连接');backToMode();}break;
      case'error':if(!isHost&&!myPlayerId)document.getElementById('lobbyError').textContent=m.message;else if(isHost)document.getElementById('hostError').textContent=m.message;else document.getElementById('joinError').textContent=m.message;break;
      case'input':if(gameMode==='multi-host'){remoteInputs[m.playerId]={dir:m.dir,shoot:m.shoot};}break;
    }
  };
  ws.onclose=()=>{if(gameMode.startsWith('multi')&&document.getElementById('lobbyScreen').style.display!=='flex'){backToMode();}};
  ws.onerror=()=>{};
}

function joinRoom(){
  const code=document.getElementById('roomCodeInput').value.toUpperCase();
  if(code.length!==4){document.getElementById('lobbyError').textContent='请输入4位房间码';return;}
  if(!ws||ws.readyState!==1){document.getElementById('lobbyError').textContent='未连接到服务器，请稍等';return;}
  ws.send(JSON.stringify({type:'join_room',roomCode:code,name:'玩家'}));
}
function startMultiGame(){
  if(!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({type:'start_game'}));
}

function updateHostPlayers(list){const el=document.getElementById('hostPlayerList');el.innerHTML=list.map(p=>`<div class="player-row"><div class="player-dot" style="background:${p.color}"></div>${p.name}</div>`).join('');document.getElementById('startBtn').disabled=list.length<2;}
function updateJoinPlayers(list){const el=document.getElementById('joinPlayerList');el.innerHTML=list.map(p=>`<div class="player-row"><div class="player-dot" style="background:${p.color}"></div>${p.name}${p.id===myPlayerId?' (你)':''}</div>`).join('');}
let _hostPlayerList=[];
function updateHostPlayersByJoin(m){_hostPlayerList.push({id:m.playerId,name:m.name,color:m.color});updateHostPlayers([{id:myPlayerId,name:'主机 (你)',color:'#4ecdc4'},..._hostPlayerList]);}
function removeHostPlayer(pid){_hostPlayerList=_hostPlayerList.filter(p=>p.id!==pid);updateHostPlayers([{id:myPlayerId,name:'主机 (你)',color:'#4ecdc4'},..._hostPlayerList]);}
function removeJoinPlayer(pid){_joinPlayerList=_joinPlayerList.filter(p=>p.id!==pid);updateJoinPlayers(_joinPlayerList);}
let _joinPlayerList=[];
function updateJoinPlayerList(list){_joinPlayerList=list;updateJoinPlayers(list);}
function startMultiPlayerGame(m){
  document.getElementById('modeScreen').style.display='none';document.getElementById('lobbyScreen').style.display='none';document.getElementById('gameWrapper').style.display='flex';
  gameMode='multi-host';
  document.getElementById('panelTitle').textContent='联机对战';
  document.getElementById('remainingLabel').textContent='存活';
  document.getElementById('xpStat').style.display='none';
  document.getElementById('statusMsg').textContent='';
  myPlayerId=m.players.find(p=>p.id===myPlayerId)?.id||myPlayerId;
  multiPlayers=m.players.map((p,i)=>({id:p.id,name:p.name,color:p.color,spawnX:p.spawnX*TILE+2,spawnY:p.spawnY*TILE+2,lives:3,alive:true,tank:null}));
  remoteInputs={};
  myColor=multiPlayers.find(p=>p.id===myPlayerId)?.color||'#4ecdc4';
  // Init map & PvP game
  map=getLevelMap(1);
  multiPlayers.forEach(mp=>{mp.tank=createMultiTank(mp.spawnX,mp.spawnY,mp.color,mp.id);mp.alive=true;});
  player=multiPlayers.find(p=>p.id===myPlayerId)?.tank||null;
  enemies=[];bullets=[];explosions=[];powerups=[];floatingTexts=[];
  freezeTimer=0;speedBoostTimer=0;rapidFireTimer=0;baseRegenTimer=0;
  score=0;enemiesRemaining=multiPlayers.filter(p=>p.alive).length-1;enemiesPerLevel=99;totalEnemiesSpawned=0;
  gameRunning=true;gameOver=false;gamePaused=false;level=0;
  if(gameMode==='multi-host')enemiesRemaining=multiPlayers.filter(p=>p.id!==myPlayerId).length;
  updateUI();
}
function resetMultiLobby(players){
  _hostPlayerList=players.filter(p=>p.id!==myPlayerId).map(p=>({id:p.id,name:p.name,color:p.color}));
  document.getElementById('lobbyScreen').style.display='flex';
  if(isHost){document.getElementById('hostView').style.display='flex';document.getElementById('lobbyChoice').style.display='none';updateHostPlayers([{id:myPlayerId,name:'主机 (你)',color:'#4ecdc4'},..._hostPlayerList]);document.getElementById('startBtn').disabled=false;}
  else{document.getElementById('joinView').style.display='flex';document.getElementById('lobbyChoice').style.display='none';updateJoinPlayerList(players);}
  gameRunning=false;gameOver=false;gamePaused=false;
  gameMode='';document.getElementById('gameWrapper').style.display='none';
}

function createMultiTank(x,y,color,pid){
  const t=new Tank(x,y,DIR_UP,color,true,null);t.playerId=pid;t.lives=3;t.alive=true;t.pColor=color;
  t.speed=2.8;t.shootDelay=24;t.maxBullets=1;t.isMultiPlayer=true;t.invincibleUntil=Date.now()+3000;
  return t;
}

// ==================== HELPERS ====================
function randomPowerupType(){let t=0;for(const k of POWERUP_KEYS)t+=POWERUP_TYPES[k].weight;let r=Math.random()*t;for(const k of POWERUP_KEYS){r-=POWERUP_TYPES[k].weight;if(r<=0)return POWERUP_TYPES[k];}return POWERUP_TYPES.SHIELD;}
function xpForLevel(lv){return XP_THRESHOLDS[lv-1];}
function xpToNext(lv){return XP_THRESHOLDS[lv]-XP_THRESHOLDS[lv-1];}
function addXP(v){xp+=v;while(playerUpgrade<8&&xp>=XP_THRESHOLDS[playerUpgrade]){playerUpgrade++;applyUpgradeStats();}updateUI();}
function loseUpgrade(){if(playerUpgrade<=1)return;playerUpgrade--;xp=XP_THRESHOLDS[playerUpgrade-1];applyUpgradeStats();updateUI();}
function applyUpgradeStats(){if(player&&player.active){player.color=UPGRADE_COLORS[playerUpgrade-1];player.speed=2.5+(playerUpgrade-1)*0.4;player.shootDelay=Math.max(14,30-(playerUpgrade-1)*2);player.maxBullets=playerUpgrade>=6?3:playerUpgrade>=3?2:1;}}
function availableEnemyTypes(){const lv=level+Math.floor(playerUpgrade/2);if(lv>=6)return['NORMAL','FAST','ARMORED','HEAVY'];if(lv>=4)return['NORMAL','FAST','ARMORED'];if(lv>=2)return['NORMAL','FAST'];return['NORMAL'];}
function pickEnemyType(){const keys=availableEnemyTypes();let t=0;for(const k of keys)t+=ENEMY_TYPES[k].weight;if(keys.includes('HEAVY'))t-=ENEMY_TYPES.HEAVY.weight*0.6;if(keys.includes('ARMORED'))t-=ENEMY_TYPES.ARMORED.weight*0.2;let r=Math.random()*t;for(const k of keys){let w=ENEMY_TYPES[k].weight;if(k==='HEAVY')w*=0.4;else if(k==='ARMORED')w*=0.8;r-=w;if(r<=0)return ENEMY_TYPES[k];}return ENEMY_TYPES.NORMAL;}
function createExplosion(x,y,big=false){explosions.push(new Explosion(x+TILE/2,y+TILE/2,big));}
function spawnPowerupAt(x,y){if(Math.random()>0.2)return;powerups.push(new Powerup(x,y,randomPowerupType()));}
function spawnPowerup(col,row){if(Math.random()>0.18)return;powerups.push(new Powerup(col*TILE+4,row*TILE+4,randomPowerupType()));}
function destroyTile(col,row){if(row<0||row>=ROWS||col<0||col>=COLS)return'none';const t=map[row][col];if(t===TILE_BRICK){map[row][col]=TILE_EMPTY;spawnPowerup(col,row);return'brick';}if(t===TILE_BASE){map[row][col]=TILE_EMPTY;return'base';}return'none';}

// ==================== COLLISION ====================
function tileAt(px,py){const r=Math.floor(py/TILE),c=Math.floor(px/TILE);if(r<0||r>=ROWS||c<0||c>=COLS)return TILE_STEEL;return map[r][c];}
function solidTile(t){return t===TILE_BRICK||t===TILE_STEEL||t===TILE_BASE||t===TILE_WALL;}
function rectsOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function rectCollidesMap(r){return solidTile(tileAt(r.x+2,r.y+2))||solidTile(tileAt(r.x+r.w-2,r.y+2))||solidTile(tileAt(r.x+2,r.y+r.h-2))||solidTile(tileAt(r.x+r.w-2,r.y+r.h-2));}
function bulletHitsMap(b){const col=Math.floor((b.x+b.w/2)/TILE),row=Math.floor((b.y+b.h/2)/TILE);if(row<0||row>=ROWS||col<0||col>=COLS)return{hit:true,type:TILE_STEEL,col,row};const t=map[row][col];if(solidTile(t))return{hit:true,type:t,col,row};return{hit:false,type:TILE_EMPTY,col,row};}

// ==================== CLASSES ====================
class Tank{constructor(x,y,dir,color,isP=false,et=null){this.x=x;this.y=y;this.w=TILE-4;this.h=TILE-4;this.dir=dir;this.color=color;this.speed=isP?2.5:1.2;this.isPlayer=isP;this.shootCooldown=0;this.shootDelay=isP?30:60;this.active=true;this.aiDirTimer=0;this.aiShootTimer=0;this.invincibleUntil=0;this.maxBullets=1;this.hp=1;this.maxHp=1;this.xpValue=100;this.enemyType=et;this.playerId='';this.isMultiPlayer=false;this.lives=3;this.alive=true;this.pColor=color;}
  getRect(){const s=this.enemyType?this.enemyType.size:1;const dw=(this.w*s-this.w)/2,dh=(this.h*s-this.h)/2;return{x:this.x-dw,y:this.y-dh,w:this.w*s,h:this.h*s};}
  isInvincible(){return this.invincibleUntil>Date.now();}
  move(dir,mul=1){this.dir=dir;const b=this.isPlayer&&speedBoostTimer>0?this.speed*2:this.speed;const spd=b*mul;const nx=this.x+dx[dir]*spd,ny=this.y+dy[dir]*spd;const cx=Math.max(0,Math.min(nx,canvas.width-this.w)),cy=Math.max(0,Math.min(ny,canvas.height-this.h));const s=this.enemyType?this.enemyType.size:1;const bt={x:cx-(this.w*s-this.w)/2,y:cy-(this.h*s-this.h)/2,w:this.w*s,h:this.h*s};if(!rectCollidesMap(bt)){const all=gameMode.startsWith('multi')?(gameMode==='multi-host'?[...multiPlayers.map(p=>p.tank).filter(t=>t&&t.active&&t!==this)]:[]):this.isPlayer?enemies:[player,...enemies.filter(e=>e!==this&&e.active)];if(!all.filter(t=>t&&t.active).some(t=>rectsOverlap(bt,t.getRect()))){this.x=cx;this.y=cy;}return;}if(dir===DIR_UP||dir===DIR_DOWN){const s2={x:this.x-(this.w*s-this.w)/2,y:cy-(this.h*s-this.h)/2,w:this.w*s,h:this.h*s};if(!rectCollidesMap(s2))this.y=cy;}else{const s2={x:cx-(this.w*s-this.w)/2,y:this.y-(this.h*s-this.h)/2,w:this.w*s,h:this.h*s};if(!rectCollidesMap(s2))this.x=cx;}}
  shoot(){if(this.shootCooldown>0)return null;const d=this.isPlayer&&rapidFireTimer>0?Math.floor(this.shootDelay/2):this.shootDelay;this.shootCooldown=d;const ret=[];const n=this.maxBullets;const offs=n===1?[0]:n===2?[-4,4]:[-6,0,6];for(const o of offs){let bx=this.x+this.w/2-3,by=this.y+this.h/2-3;if(this.dir===DIR_UP){by=this.y-6;bx+=o;}else if(this.dir===DIR_DOWN){by=this.y+this.h;bx+=o;}else if(this.dir===DIR_LEFT){bx=this.x-6;by+=o;}else if(this.dir===DIR_RIGHT){bx=this.x+this.w;by+=o;}ret.push(new Bullet(bx,by,this.dir,this.isPlayer?this.playerId||'local':'ai'));}return ret;}
  update(){if(this.shootCooldown>0)this.shootCooldown--;}
  draw(ctx){ctx.save();const cx=this.x+this.w/2,cy=this.y+this.h/2;ctx.translate(cx,cy);ctx.rotate([0,Math.PI/2,Math.PI,-Math.PI/2][this.dir]);if(this.isInvincible()){ctx.shadowColor='#00ffff';ctx.shadowBlur=12+Math.sin(Date.now()/80)*6;}const s=this.enemyType?this.enemyType.size:1;const bw=this.w*s,bh=this.h*s;ctx.fillStyle=this.pColor||this.color;ctx.fillRect(-bw/2,-bh/2,bw,bh);if(this.enemyType&&this.enemyType.id==='heavy'){ctx.fillStyle='#1a1a1a';ctx.fillRect(-bw/2+2,-bh/2+2,4,bh-4);ctx.fillRect(bw/2-6,-bh/2+2,4,bh-4);}ctx.fillStyle='#1a1a1a';ctx.fillRect(-bw/2-2,-bh/2,4,bh);ctx.fillRect(bw/2-2,-bh/2,4,bh);ctx.strokeStyle='#444';ctx.lineWidth=1;for(let i=0;i<4;i++){const ty=-bh/2+4+i*7;ctx.beginPath();ctx.moveTo(-bw/2-2,ty);ctx.lineTo(-bw/2+2,ty);ctx.moveTo(bw/2-2,ty);ctx.lineTo(bw/2+2,ty);ctx.stroke();}ctx.fillStyle=this.isPlayer?'#66ff66':'#ff9999';ctx.fillRect(-3,-bh/2-10,6,14);if(!this.isPlayer&&this.enemyType&&this.enemyType.id!=='normal'){ctx.fillStyle='#fff';ctx.font='bold 9px "Microsoft YaHei","SimHei",sans-serif';ctx.textAlign='center';ctx.fillText(this.enemyType.label,0,-bh/2-12);}if(!this.isPlayer&&this.maxHp>1){const hpW=bw*0.8,hpH=3;ctx.fillStyle='#333';ctx.fillRect(-hpW/2,-bh/2-5,hpW,hpH);const ratio=this.hp/this.maxHp;ctx.fillStyle=ratio>0.5?'#2ecc71':ratio>0.25?'#f39c12':'#e74c3c';ctx.fillRect(-hpW/2,-bh/2-5,hpW*ratio,hpH);}ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();ctx.restore();}
}
class Bullet{constructor(x,y,dir,ownerId){this.x=x;this.y=y;this.w=6;this.h=6;this.dir=dir;this.speed=3.2;this.ownerId=ownerId||'ai';this.active=true;}
  getRect(){return{x:this.x,y:this.y,w:this.w,h:this.h};}
  update(){this.x+=dx[this.dir]*this.speed;this.y+=dy[this.dir]*this.speed;if(this.x<-10||this.x>canvas.width+10||this.y<-10||this.y>canvas.height+10)this.active=false;}
  draw(ctx){ctx.fillStyle=this.ownerId==='ai'?'#ff6666':'#ffff44';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=4;ctx.fillRect(this.x,this.y,this.w,this.h);ctx.shadowBlur=0;}
}
class Explosion{constructor(x,y,big=false){this.x=x;this.y=y;this.life=big?20:12;this.maxLife=this.life;}update(){this.life--;}get active(){return this.life>0;}draw(ctx){const p=1-this.life/this.maxLife;const r=(this.maxLife>15?28:18)*p;const a=1-p;ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(this.x,this.y,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(this.x,this.y,r*0.6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(this.x,this.y,r*0.3,0,Math.PI*2);ctx.fill();ctx.restore();}}
class FloatingText{constructor(x,y,text,color,dur=150){this.x=x;this.y=y;this.text=text;this.color=color;this.life=dur;this.maxLife=dur;}update(){this.life--;this.y-=0.5;}get active(){return this.life>0;}draw(ctx){const p=this.life/this.maxLife;const alpha=p<0.25?p/0.25:1;const scale=1+(1-p)*0.6;const w=Math.sin(Date.now()/150)*3*(1-p);ctx.save();ctx.globalAlpha=alpha*0.9;ctx.translate(this.x+w,this.y);ctx.scale(scale,scale);ctx.shadowColor='#44ff44';ctx.shadowBlur=20;ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=4;ctx.font='bold 56px "Microsoft YaHei","SimHei","PingFang SC",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.strokeText(this.text,0,0);const g=ctx.createLinearGradient(0,-28,0,28);g.addColorStop(0,'#aaffaa');g.addColorStop(0.5,'#44ff44');g.addColorStop(1,'#22cc22');ctx.fillStyle=g;ctx.shadowBlur=8;ctx.fillText(this.text,0,0);ctx.restore();}}
class Powerup{constructor(x,y,type){this.x=x;this.y=y;this.w=24;this.h=24;this.type=type;this.life=600;}getRect(){return{x:this.x,y:this.y,w:this.w,h:this.h};}update(){this.life--;}get active(){return this.life>0;}draw(ctx){const alpha=this.life<120?this.life/120:1;const pulse=1+Math.sin(Date.now()/200)*0.15;ctx.save();ctx.globalAlpha=alpha;ctx.translate(this.x+this.w/2,this.y+this.h/2);ctx.scale(pulse,pulse);ctx.fillStyle=this.type.color;ctx.shadowColor=this.type.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(0,0,this.w/2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.type.label,0,1);ctx.restore();}}

// ==================== GAME RESET ====================
function resetGame(){
  score=0;lives=3;level=1;playerUpgrade=1;xp=0;enemiesPerLevel=20;totalEnemiesSpawned=0;enemiesRemaining=20;
  gameOver=false;gameRunning=true;gamePaused=false;
  enemies=[];bullets=[];explosions=[];powerups=[];floatingTexts=[];
  enemySpawnTimer=0;freezeTimer=0;speedBoostTimer=0;rapidFireTimer=0;baseRegenTimer=0;
  map=getLevelMap(level);player=createPlayer();
  document.getElementById('gameWrapper').style.display='flex';
  updateUI();
}
function createPlayer(){const lv=playerUpgrade;let sy=TILE*13+2,sx=TILE*9+2;for(let i=0;i<6;i++){if(!rectCollidesMap({x:sx,y:sy,w:TILE-4,h:TILE-4}))break;sy-=TILE;}const p=new Tank(sx,sy,DIR_UP,UPGRADE_COLORS[lv-1],true,null);p.invincibleUntil=Date.now()+3000;p.speed=2.5+(lv-1)*0.4;p.shootDelay=Math.max(14,30-(lv-1)*2);p.maxBullets=lv>=6?3:lv>=3?2:1;p.playerId='local';return p;}
function nextLevel(){level++;enemiesPerLevel=16+level*4;totalEnemiesSpawned=0;enemiesRemaining=enemiesPerLevel;maxEnemiesOnScreen=Math.min(8,5+Math.floor((level-1)/1.5));enemySpawnInterval=Math.max(40,90-level*8);enemies=[];bullets=[];powerups=[];explosions=[];floatingTexts=[];enemySpawnTimer=0;freezeTimer=0;speedBoostTimer=0;rapidFireTimer=0;baseRegenTimer=0;map=getLevelMap(level);player=createPlayer();updateUI();}
function onBaseDestroyed(){lives--;loseUpgrade();updateUI();if(lives<=0){gameOver=true;gameRunning=false;return;}baseRegenTimer=90;player.active=false;createExplosion(player.x,player.y,true);floatingTexts.push(new FloatingText(player.x+player.w/2,player.y,'菜','#44ff44'));setTimeout(()=>{if(!gameOver)player=createPlayer();},1000);}
function updateEnemyAI(enemy){if(!enemy.active)return null;if(freezeTimer>0)return null;enemy.aiShootTimer++;enemy.aiDirTimer--;if(enemy.aiDirTimer<=0){if(Math.random()<0.7&&player&&player.active){const a=Math.atan2(player.y+player.h/2-(enemy.y+enemy.h/2),player.x+player.w/2-(enemy.x+enemy.w/2));enemy.dir=Math.abs(Math.cos(a))>Math.abs(Math.sin(a))?(Math.cos(a)>0?DIR_RIGHT:DIR_LEFT):(Math.sin(a)>0?DIR_DOWN:DIR_UP);}else{enemy.dir=Math.floor(Math.random()*4);}enemy.aiDirTimer=30+Math.floor(Math.random()*70);}enemy.move(enemy.dir);if(enemy.aiShootTimer>enemy.shootDelay+Math.random()*60&&player&&player.active){enemy.aiShootTimer=0;return enemy.shoot();}return null;}
function spawnEnemy(){if(totalEnemiesSpawned>=enemiesPerLevel||enemies.filter(e=>e.active).length>=maxEnemiesOnScreen)return;const sps=[{x:TILE*3+2,y:TILE*1+2},{x:TILE*9+2,y:TILE*1+2},{x:TILE*15+2,y:TILE*1+2},{x:TILE*1+2,y:TILE*5+2},{x:TILE*1+2,y:TILE*9+2},{x:TILE*18+2,y:TILE*5+2},{x:TILE*18+2,y:TILE*9+2}];const v=sps.filter(sp=>!rectCollidesMap({x:sp.x,y:sp.y,w:TILE-4,h:TILE-4}));if(v.length===0)return;const sp=v[Math.floor(Math.random()*v.length)],type=pickEnemyType(),s=type.size,he=((TILE-4)*s-(TILE-4))/2,sx=sp.x-he,sy=sp.y-he,bw=(TILE-4)*s,bh=(TILE-4)*s,bt={x:sx,y:sy,w:bw,h:bh};if(rectCollidesMap(bt))return;if([player,...enemies].filter(t=>t&&t.active).some(t=>rectsOverlap(bt,t.getRect())))return;const e=new Tank(sx,sy,DIR_DOWN,type.color,false,type);e.hp=type.hp;e.maxHp=type.hp;e.speed=type.speed+level*0.08+Math.random()*0.3;e.shootDelay=Math.max(18,type.shootDelay-level*5);e.xpValue=type.xp;enemies.push(e);totalEnemiesSpawned++;enemiesRemaining=enemiesPerLevel-totalEnemiesSpawned;updateUI();}

// ==================== SERIALIZATION ====================
function serializeGameState(){
  const allTanks=multiPlayers.filter(p=>p.tank).map(p=>({id:p.id,playerId:p.id,x:Math.round(p.tank.x),y:Math.round(p.tank.y),dir:p.tank.dir,color:p.color,alive:p.alive,lives:p.lives,invincible:p.tank.isInvincible()?1:0,active:p.tank.active}));
  return{type:'game_state',tanks:allTanks,bullets:bullets.filter(b=>b.active).map(b=>({x:Math.round(b.x),y:Math.round(b.y),dir:b.dir,ownerId:b.ownerId})),powerups:powerups.filter(p=>p.active).map(p=>({x:Math.round(p.x),y:Math.round(p.y),type:p.type.id})),explosions:explosions.filter(e=>e.active).map(e=>({x:Math.round(e.x),y:Math.round(e.y),big:e.maxLife>15})),scores:multiScores,aliveCount:multiPlayers.filter(p=>p.alive).length,winner:multiWinner};
}
function deserializeGameState(s){
  if(!s||!s.tanks)return;
  // Update or create player tanks
  multiPlayers.forEach(mp=>{
    const td=s.tanks.find(t=>t.id===mp.id);
    if(td){
      if(!mp.tank||!mp.tank.pColor){mp.tank=createMultiTank(td.x,td.y,td.color,mp.id);mp.tank.pColor=td.color;}
      mp.tank.x=td.x;mp.tank.y=td.y;mp.tank.dir=td.dir;mp.tank.active=td.active;mp.tank.alive=td.alive;
      mp.alive=td.alive;mp.lives=td.lives;
      mp.tank.invincibleUntil=td.invincible?Date.now()+100:0;
    }
  });
  // Find my tank
  const my=multiPlayers.find(p=>p.id===myPlayerId);
  if(my&&my.tank)player=my.tank;
  // Bullets
  bullets=s.bullets.map(b=>{const bl=new Bullet(b.x,b.y,b.dir,b.ownerId);return bl;});
  // Powerups
  const typeMap={};for(const k of POWERUP_KEYS)typeMap[POWERUP_TYPES[k].id]=POWERUP_TYPES[k];
  powerups=s.powerups.map(p=>new Powerup(p.x,p.y,typeMap[p.type]||POWERUP_TYPES.SHIELD));
  // Explosions
  explosions=s.explosions.map(e=>new Explosion(e.x,e.y,e.big));
  // Update enemies remaining
  enemiesRemaining=s.aliveCount?Math.max(0,s.aliveCount-1):0;
}

// ==================== SEND INPUT ====================
function sendInput(){
  if(!ws||ws.readyState!==1||!gameRunning)return;
  let dir=-1,shoot=false;
  if(player&&player.active){
    if(keys['ArrowUp']||keys['w'])dir=DIR_UP;else if(keys['ArrowDown']||keys['s'])dir=DIR_DOWN;else if(keys['ArrowLeft']||keys['a'])dir=DIR_LEFT;else if(keys['ArrowRight']||keys['d'])dir=DIR_RIGHT;else if(touchInput)dir=touchInput.dir;
    shoot=!!(keys[' ']||touchShooting);
  }
  if(dir!==sentInputState.dir||shoot!==sentInputState.shoot){
    sentInputState={dir,shoot};
    ws.send(JSON.stringify({type:'input',dir,shoot}));
  }
}

// ==================== UI ====================
function updateUI(){
  document.getElementById('score').textContent=score;
  document.getElementById('remaining').textContent=enemiesRemaining;
  document.getElementById('level').textContent=level||'-';
  if(gameMode==='single'){
    document.getElementById('livesDisplay').textContent=Array.from({length:Math.max(0,lives)},()=>'🛡️').join(' ');
    const upEl=document.getElementById('upgradeDisplay');upEl.textContent='Lv'+playerUpgrade;upEl.style.color=UPGRADE_COLORS[playerUpgrade-1];
    const cur=xpForLevel(playerUpgrade),nxt=xpToNext(playerUpgrade);document.getElementById('xpBar').style.width=(playerUpgrade>=8?100:Math.floor((xp-cur)/nxt*100))+'%';
    document.getElementById('xpText').textContent=playerUpgrade>=8?'MAX':(xp-cur)+'/'+(cur+nxt);
  }else{
    const my=multiPlayers.find(p=>p.id===myPlayerId);
    if(my)document.getElementById('livesDisplay').textContent=Array.from({length:Math.max(0,my.lives)},()=>'🛡️').join(' ');
  }
  const buffEl=document.getElementById('buffIndicator');buffEl.className='buff-indicator';buffEl.textContent='';
  if(freezeTimer>0){buffEl.className+=' buff-freeze active';buffEl.textContent='❄️ 冰冻 '+Math.ceil(freezeTimer/60)+'s';}
  else if(speedBoostTimer>0){buffEl.className+=' buff-speed active';buffEl.textContent='⚡ 加速 '+Math.ceil(speedBoostTimer/60)+'s';}
  else if(rapidFireTimer>0){buffEl.className+=' buff-rapid active';buffEl.textContent='🔥 速射 '+Math.ceil(rapidFireTimer/60)+'s';}
  else if(player&&player.active&&player.isInvincible()&&!gameOver){const s=Math.ceil((player.invincibleUntil-Date.now())/1000);if(s>0){buffEl.className+=' buff-shield active';buffEl.textContent='🛡️ 护盾 '+s+'s';}}
  const msgEl=document.getElementById('statusMsg');
  if(gameMode.startsWith('multi')){
    if(multiWinner){
      if(multiWinner===myPlayerId)msgEl.textContent='你赢了！';else msgEl.textContent=multiWinner+' 获胜';
      msgEl.style.color='#f5c518';
    }else msgEl.textContent='';
  }else{
    if(gameOver&&lives<=0){msgEl.textContent='游戏结束！';msgEl.style.color='#e94560';}else if(gameOver){msgEl.textContent='胜利！';msgEl.style.color='#4ecdc4';}else if(gamePaused){msgEl.textContent='已暂停';msgEl.style.color='#f5c518';}else msgEl.textContent='';
  }
}
function applyPowerup(t){switch(t.id){case'life':if(lives<5)lives++;break;case'shield':if(player&&player.active)player.invincibleUntil=Date.now()+3000;break;case'freeze':freezeTimer=360;break;case'speed':speedBoostTimer=540;break;case'rapid':rapidFireTimer=540;break;}updateUI();}

// ==================== MAIN LOOP ====================
function gameLoop(){frameCount++;update();draw();requestAnimationFrame(gameLoop);}

function update(){
  if(!gameRunning||gameOver)return;

  if(gameMode==='single'){
    updateSingle();
  }else if(gameMode==='multi-host'){
    updateMultiHost();
  }else if(gameMode==='multi-join'){
    updateMultiJoin();
  }
}

function updateSingle(){
  if(gamePaused)return;
  if(freezeTimer>0)freezeTimer--;if(speedBoostTimer>0)speedBoostTimer--;if(rapidFireTimer>0)rapidFireTimer--;
  if(baseRegenTimer>0){baseRegenTimer--;if(baseRegenTimer===0)regenerateBase();}
  if(player&&player.active){
    if(keys['ArrowUp']||keys['w'])player.move(DIR_UP);else if(keys['ArrowDown']||keys['s'])player.move(DIR_DOWN);else if(keys['ArrowLeft']||keys['a'])player.move(DIR_LEFT);else if(keys['ArrowRight']||keys['d'])player.move(DIR_RIGHT);else if(touchInput!==null)player.move(touchInput.dir,touchInput.spd);
    if(keys[' ']||touchShooting){const r=player.shoot();if(r){if(Array.isArray(r))bullets.push(...r);else bullets.push(r);}}
    player.update();
    for(let i=powerups.length-1;i>=0;i--){if(powerups[i].active&&rectsOverlap(player.getRect(),powerups[i].getRect())){applyPowerup(powerups[i].type);powerups.splice(i,1);}}
  }
  enemySpawnTimer++;if(enemySpawnTimer>=enemySpawnInterval&&enemies.filter(e=>e.active).length<maxEnemiesOnScreen&&totalEnemiesSpawned<enemiesPerLevel){enemySpawnTimer=0;spawnEnemy();}
  enemies.forEach(en=>{if(!en.active)return;en.update();const r=updateEnemyAI(en);if(r){if(Array.isArray(r))bullets.push(...r);else bullets.push(r);}});
  powerups.forEach(p=>p.update());
  // Bullets
  bullets.forEach(b=>{if(!b.active)return;b.update();const mh=bulletHitsMap(b);if(mh.hit){b.active=false;const r=destroyTile(mh.col,mh.row);if(r==='brick')createExplosion(mh.col*TILE,mh.row*TILE,false);else if(r==='base'){createExplosion(mh.col*TILE,mh.row*TILE,true);onBaseDestroyed();}else if(mh.type===TILE_STEEL)createExplosion(mh.col*TILE,mh.row*TILE,false);return;}
    if(b.ownerId==='local'||b.ownerId===myPlayerId){enemies.forEach(en=>{if(!en.active||!b.active)return;if(rectsOverlap(b.getRect(),en.getRect())){b.active=false;en.hp--;if(en.hp<=0){en.active=false;createExplosion(en.x+en.w/2,en.y+en.h/2,true);score+=100;addXP(en.xpValue);spawnPowerupAt(en.x+en.w/2,en.y+en.h/2);}else{createExplosion(en.x+en.w/2,en.y+en.h/2,false);}updateUI();}});}
    else{if(player&&player.active&&b.active&&rectsOverlap(b.getRect(),player.getRect())){if(player.isInvincible()){b.active=false;return;}b.active=false;player.active=false;createExplosion(player.x,player.y,true);floatingTexts.push(new FloatingText(player.x+player.w/2,player.y,'菜','#44ff44'));lives--;loseUpgrade();updateUI();if(lives<=0){gameOver=true;gameRunning=false;}else{setTimeout(()=>{if(!gameOver)player=createPlayer();},1000);}}}});
  for(let i=0;i<bullets.length;i++){for(let j=i+1;j<bullets.length;j++){if(bullets[i].active&&bullets[j].active&&bullets[i].ownerId!==bullets[j].ownerId&&rectsOverlap(bullets[i].getRect(),bullets[j].getRect())){bullets[i].active=false;bullets[j].active=false;createExplosion(bullets[i].x,bullets[i].y,false);}}}
  if(player&&player.active&&player.isInvincible()){enemies.forEach(en=>{if(!en.active)return;if(rectsOverlap(player.getRect(),en.getRect())){en.hp--;if(en.hp<=0){en.active=false;createExplosion(en.x,en.y,true);score+=100;addXP(en.xpValue);spawnPowerupAt(en.x+en.w/2,en.y+en.h/2);}else{createExplosion(en.x+en.w/2,en.y+en.h/2,false);}updateUI();}});}
  floatingTexts.forEach(f=>f.update());
  bullets=bullets.filter(b=>b.active);enemies=enemies.filter(e=>e.active);explosions=explosions.filter(e=>e.active);powerups=powerups.filter(p=>p.active);floatingTexts=floatingTexts.filter(f=>f.active);
  if(totalEnemiesSpawned>=enemiesPerLevel&&enemies.filter(e=>e.active).length===0&&gameRunning&&!gameOver){score+=500;if(level>=6){gameRunning=false;gameOver=true;updateUI();}else nextLevel();}
  if(gameRunning&&(freezeTimer>0||speedBoostTimer>0||rapidFireTimer>0))updateUI();
}

function updateMultiHost(){
  // Process remote inputs
  for(const [pid,input] of Object.entries(remoteInputs)){
    const mp=multiPlayers.find(p=>p.id===pid);
    if(!mp||!mp.tank||!mp.alive)continue;
    if(input&&input.dir>=0)mp.tank.move(input.dir,1);
    if(input&&input.shoot){const r=mp.tank.shoot();if(r){if(Array.isArray(r))bullets.push(...r);else bullets.push(r);}}
    mp.tank.update();
  }
  remoteInputs={};

  // Local player input
  if(player&&player.active){
    if(keys['ArrowUp']||keys['w'])player.move(DIR_UP);else if(keys['ArrowDown']||keys['s'])player.move(DIR_DOWN);else if(keys['ArrowLeft']||keys['a'])player.move(DIR_LEFT);else if(keys['ArrowRight']||keys['d'])player.move(DIR_RIGHT);else if(touchInput!==null)player.move(touchInput.dir,touchInput.spd);
    if(keys[' ']||touchShooting){const r=player.shoot();if(r){if(Array.isArray(r))bullets.push(...r);else bullets.push(r);}}
    player.update();
  }

  // Powerups
  powerups.forEach(p=>p.update());
  // Spawn powerups occasionally
  if(Math.random()<0.005&&powerups.length<5){const rx=2+Math.floor(Math.random()*16),ry=2+Math.floor(Math.random()*14);if(map[ry]&&map[ry][rx]===TILE_EMPTY)powerups.push(new Powerup(rx*TILE+4,ry*TILE+4,randomPowerupType()));}

  // Bullet collisions
  bullets.forEach(b=>{if(!b.active)return;b.update();const mh=bulletHitsMap(b);if(mh.hit){b.active=false;const r=destroyTile(mh.col,mh.row);if(r==='brick')createExplosion(mh.col*TILE,mh.row*TILE,false);else createExplosion(mh.col*TILE,mh.row*TILE,false);return;}
    // Check against all other players
    multiPlayers.forEach(mp=>{
      if(!mp.tank||!mp.alive||!b.active)return;
      if(mp.id===b.ownerId)return;
      if(rectsOverlap(b.getRect(),mp.tank.getRect())){
        if(mp.tank.isInvincible()){b.active=false;return;}
        b.active=false;mp.tank.active=false;mp.alive=false;mp.lives--;
        createExplosion(mp.tank.x+mp.tank.w/2,mp.tank.y+mp.tank.h/2,true);
        floatingTexts.push(new FloatingText(mp.tank.x+mp.tank.w/2,mp.tank.y,'菜','#44ff44'));
        if(b.ownerId===myPlayerId){score+=200;}
        // Respawn
        setTimeout(()=>{
          const aliveCount=multiPlayers.filter(p=>p.alive).length;
          if(aliveCount<=1)return;
          const sps=[[3,2],[9,2],[16,2],[9,13],[3,13],[16,13]];
          const sp=sps[Math.floor(Math.random()*sps.length)];
          const sx2=sp[0]*TILE+2,sy2=sp[1]*TILE+2;
          mp.tank=createMultiTank(sx2,sy2,mp.color,mp.id);
          mp.alive=true;mp.tank.lives=mp.lives;
        },2500);
        checkMultiWin();
      }
    });
  });
  // Bullet vs bullet
  for(let i=0;i<bullets.length;i++){for(let j=i+1;j<bullets.length;j++){if(bullets[i].active&&bullets[j].active&&bullets[i].ownerId!==bullets[j].ownerId&&rectsOverlap(bullets[i].getRect(),bullets[j].getRect())){bullets[i].active=false;bullets[j].active=false;createExplosion(bullets[i].x,bullets[i].y,false);}}}
  floatingTexts.forEach(f=>f.update());
  // Pick up powerups
  multiPlayers.forEach(mp=>{if(!mp.tank||!mp.alive)return;for(let i=powerups.length-1;i>=0;i--){if(powerups[i].active&&rectsOverlap(mp.tank.getRect(),powerups[i].getRect())){applyMultiPowerup(mp.tank,powerups[i].type);powerups.splice(i,1);}}});
  bullets=bullets.filter(b=>b.active);explosions=explosions.filter(e=>e.active);powerups=powerups.filter(p=>p.active);floatingTexts=floatingTexts.filter(f=>f.active);
  updateUI();

  // Broadcast state at 20Hz
  if(frameCount%3===0&&ws&&ws.readyState===1){ws.send(JSON.stringify(serializeGameState()));}
}

function checkMultiWin(){
  const alive=multiPlayers.filter(p=>p.alive);
  if(alive.length<=1&&gameRunning&&!gameOver){
    if(alive.length===1){multiWinner=alive[0].id;score+=1000;}else{multiWinner='draw';}
    gameOver=true;gameRunning=false;
    if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'game_over',winner:multiWinner,scores:multiScores}));
    updateUI();
  }
}

function applyMultiPowerup(tank,type){
  switch(type.id){
    case'life':break; // No extra lives in PvP
    case'shield':tank.invincibleUntil=Date.now()+3000;break;
    case'freeze':break; // No freeze in PvP
    case'speed':speedBoostTimer=300;break;
    case'rapid':rapidFireTimer=300;break;
  }
  updateUI();
}

function updateMultiJoin(){
  // Apply latest network state
  if(latestNetworkState){
    deserializeGameState(latestNetworkState);
    multiWinner=latestNetworkState.winner;
    if(latestNetworkState.scores)multiScores=latestNetworkState.scores;
  }
  // Tick buffs
  if(speedBoostTimer>0)speedBoostTimer--;
  if(rapidFireTimer>0)rapidFireTimer--;
  // Send input
  sendInput();
  // Update my tank locally for smoothness
  if(player&&player.active){
    if(keys['ArrowUp']||keys['w'])player.move(DIR_UP);else if(keys['ArrowDown']||keys['s'])player.move(DIR_DOWN);else if(keys['ArrowLeft']||keys['a'])player.move(DIR_LEFT);else if(keys['ArrowRight']||keys['d'])player.move(DIR_RIGHT);else if(touchInput!==null)player.move(touchInput.dir,touchInput.spd);
    player.update();
  }
  floatingTexts.forEach(f=>f.update());
  explosions=explosions.filter(e=>e.active);floatingTexts=floatingTexts.filter(f=>f.active);
  updateUI();
}

// ==================== DRAW ====================
function drawMap(){for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){const t=map[r][c],x=c*TILE,y=r*TILE;
  if(t===TILE_BRICK){ctx.fillStyle='#b5651d';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#7a3b10';ctx.fillRect(x+1,y+1,TILE/2-2,TILE/2-2);ctx.fillRect(x+TILE/2+1,y+TILE/2+1,TILE/2-2,TILE/2-2);ctx.strokeStyle='#5c2d0a';ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,TILE-1,TILE-1);}
  else if(t===TILE_WALL){ctx.fillStyle='#8b5e3c';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#6b3f1f';ctx.fillRect(x+1,y+1,TILE/2-2,TILE/2-2);ctx.fillRect(x+TILE/2+1,y+TILE/2+1,TILE/2-2,TILE/2-2);ctx.fillStyle='#5c3a1e';ctx.fillRect(x+TILE/2-3,y+2,6,TILE-4);ctx.fillRect(x+2,y+TILE/2-3,TILE-4,6);ctx.strokeStyle='#4a2a10';ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,TILE-1,TILE-1);}
  else if(t===TILE_STEEL){ctx.fillStyle='#6b7280';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#9ca3af';ctx.fillRect(x+2,y+2,TILE-4,TILE-4);ctx.fillStyle='#4b5563';ctx.fillRect(x+4,y+4,TILE-8,TILE-8);}
  else if(t===TILE_BASE&&gameMode==='single'){ctx.fillStyle='#1a1a2e';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#e94560';ctx.beginPath();ctx.moveTo(x+6,y+6);ctx.lineTo(x+TILE-6,y+TILE/2);ctx.lineTo(x+6,y+TILE-6);ctx.closePath();ctx.fill();}}}
}

function draw(){
  ctx.fillStyle='#111118';ctx.fillRect(0,0,canvas.width,canvas.height);drawMap();
  if(gameMode==='single'&&baseRegenTimer>0){const bx=9*TILE,by=(ROWS-2)*TILE;ctx.strokeStyle='rgba(233,69,96,'+(0.4+Math.sin(Date.now()/150)*0.3)+')';ctx.lineWidth=2;ctx.strokeRect(bx-4,by-4,TILE*2+8,TILE+8);ctx.fillStyle='rgba(233,69,96,0.5)';ctx.font='bold 12px "Courier New"';ctx.textAlign='center';ctx.fillText('修复中...',bx+TILE,by-8);ctx.textAlign='start';}

  // Draw enemies (single player)
  if(gameMode==='single'){enemies.forEach(e=>{if(e.active){if(freezeTimer>0){ctx.save();ctx.globalAlpha=0.5;e.draw(ctx);ctx.restore();}else e.draw(ctx);}});}

  // Draw multiplayer tanks
  if(gameMode.startsWith('multi')){
    multiPlayers.forEach(mp=>{if(mp.tank&&mp.alive){if(mp.tank.isInvincible()&&Math.floor(Date.now()/100)%2===0)mp.tank.draw(ctx);else if(!mp.tank.isInvincible())mp.tank.draw(ctx);}});
    // Draw name labels
    multiPlayers.forEach(mp=>{if(mp.tank&&mp.alive){ctx.fillStyle='#fff';ctx.font='bold 11px "Microsoft YaHei","SimHei",sans-serif';ctx.textAlign='center';ctx.fillText(mp.name||mp.id.slice(0,4),mp.tank.x+mp.tank.w/2,mp.tank.y-8);ctx.textAlign='start';}});
  }

  // Draw player (single)
  if(gameMode==='single'&&player&&player.active){if(player.isInvincible()&&Math.floor(Date.now()/100)%2===0)player.draw(ctx);else if(!player.isInvincible())player.draw(ctx);}

  bullets.forEach(b=>b.draw(ctx));explosions.forEach(e=>e.draw(ctx));powerups.forEach(p=>p.draw(ctx));floatingTexts.forEach(f=>f.draw(ctx));

  // Invincible bar
  if(player&&player.active&&player.isInvincible()){const rem=(player.invincibleUntil-Date.now())/3000;ctx.fillStyle='#00ffff';ctx.fillRect(player.x,player.y-6,player.w*Math.max(0,rem),3);}

  // Overlays
  if(gameMode==='single'){
    if(gamePaused&&!gameOver){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#f5c518';ctx.font='bold 36px "Courier New"';ctx.textAlign='center';ctx.fillText('PAUSED',canvas.width/2,canvas.height/2);ctx.textAlign='start';}
    if(!gameRunning&&!gameOver&&!gamePaused){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='bold 22px "Courier New"';ctx.textAlign='center';ctx.fillText('按Enter 或 点击画面 开始',canvas.width/2,canvas.height/2+60);ctx.textAlign='start';}
  }
  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fff';ctx.font='bold 40px "Courier New"';ctx.textAlign='center';
    if(gameMode.startsWith('multi')){
      if(multiWinner===myPlayerId)ctx.fillText('YOU WIN!',canvas.width/2,canvas.height/2-20);
      else{ctx.font='bold 30px "Courier New"';ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-20);}
    }else{if(lives<=0)ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-20);else ctx.fillText('YOU WIN!',canvas.width/2,canvas.height/2-20);}
    ctx.font='16px "Courier New"';ctx.fillText('按 Enter 重新开始',canvas.width/2,canvas.height/2+30);ctx.textAlign='start';
  }
}

// ==================== INIT ====================
map=getLevelMap(1);player=createPlayer();updateUI();gameLoop();
</script>
