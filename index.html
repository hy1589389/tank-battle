<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  .game-wrapper {
    display: flex;
    gap: 20px;
    align-items: stretch;
  }
  .side-panel {
    background: #16213e;
    border: 3px solid #0f3460;
    border-radius: 12px;
    padding: 24px;
    color: #e94560;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
    min-width: 180px;
  }
  .side-panel h2 {
    font-size: 22px;
    text-align: center;
    letter-spacing: 4px;
    color: #f5c518;
    text-shadow: 0 0 10px rgba(245, 197, 24, 0.5);
    margin-bottom: 8px;
  }
  .stat { text-align: center; }
  .stat-label { font-size: 12px; color: #8a8a8a; letter-spacing: 2px; text-transform: uppercase; }
  .stat-value { font-size: 36px; font-weight: bold; color: #fff; }
  .enemy-count { color: #e94560; }
  .lives-display { display: flex; gap: 8px; justify-content: center; }
  .life-icon { font-size: 24px; }
  canvas {
    border: 3px solid #0f3460;
    border-radius: 8px;
    image-rendering: pixelated;
    background: #0a0a0a;
  }
  .controls-info {
    text-align: center;
    font-size: 11px;
    color: #5a5a8a;
    line-height: 1.8;
  }
  .controls-info span { color: #f5c518; }
  .status-msg {
    text-align: center;
    font-size: 13px;
    font-weight: bold;
    min-height: 20px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="side-panel">
    <h2>坦 克 大 战</h2>
    <div class="stat">
      <div class="stat-label">得分</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">剩余敌人</div>
      <div class="stat-value enemy-count" id="remaining">20</div>
    </div>
    <div class="stat">
      <div class="stat-label">生命</div>
      <div class="lives-display" id="livesDisplay">🛡️ 🛡️ 🛡️</div>
    </div>
    <div class="stat">
      <div class="stat-label">关卡</div>
      <div class="stat-value" id="level" style="font-size:28px;">1</div>
    </div>
    <div class="status-msg" id="statusMsg">按 Enter 开始</div>
    <div class="controls-info">
      <span>↑↓←→</span> 移动<br>
      <span>空格</span> 射击<br>
      <span>Enter</span> 开始/暂停<br>
      <span>R</span> 重新开始
    </div>
  </div>
  <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Grid & canvas config
const TILE = 32;
const COLS = 20;
const ROWS = 18;
canvas.width = COLS * TILE;
canvas.height = ROWS * TILE;

// Game state
let score = 0;
let lives = 3;
let level = 1;
let enemiesRemaining = 20;
let gameRunning = false;
let gameOver = false;
let gamePaused = false;
let enemySpawnTimer = 0;
let enemySpawnInterval = 120;
let maxEnemiesOnScreen = 4;
let totalEnemiesSpawned = 0;
let enemiesPerLevel = 20;

// Input
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'Enter') {
    if (gameOver) resetGame();
    else { gamePaused = !gamePaused; if (!gameRunning) gameRunning = true; }
    updateUI();
  }
  if (e.key === 'r' || e.key === 'R') resetGame();
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; e.preventDefault(); });
canvas.addEventListener('click', () => {
  if (gameOver) resetGame();
  else { gamePaused = !gamePaused; if (!gameRunning) gameRunning = true; }
  updateUI();
});

// Entities
let player = null;
let enemies = [];
let bullets = [];
let explosions = [];
let map = [];

// Tile types: 0=empty, 1=brick, 2=steel, 3=base, 4=water(impassable)
const TILE_EMPTY = 0;
const TILE_BRICK = 1;
const TILE_STEEL = 2;
const TILE_BASE  = 3;

// Directions
const DIR_UP = 0, DIR_RIGHT = 1, DIR_DOWN = 2, DIR_LEFT = 3;
const dx = [0, 1, 0, -1];
const dy = [-1, 0, 1, 0];

// Level maps
function getLevelMap(n) {
  const m = [];
  for (let r = 0; r < ROWS; r++) {
    m[r] = new Array(COLS).fill(TILE_EMPTY);
  }
  // Border walls
  for (let c = 0; c < COLS; c++) { m[0][c] = TILE_STEEL; m[ROWS-1][c] = TILE_STEEL; }
  for (let r = 0; r < ROWS; r++) { m[r][0] = TILE_STEEL; m[r][COLS-1] = TILE_STEEL; }
  // Base
  m[ROWS-2][9] = TILE_BASE;
  m[ROWS-2][10] = TILE_BASE;
  m[ROWS-3][9] = TILE_STEEL;
  m[ROWS-3][10] = TILE_STEEL;
  m[ROWS-2][8] = TILE_STEEL;
  m[ROWS-2][11] = TILE_STEEL;
  m[ROWS-1][9] = TILE_STEEL;
  m[ROWS-1][10] = TILE_STEEL;
  m[ROWS-1][8] = TILE_STEEL;
  m[ROWS-1][11] = TILE_STEEL;

  // Different brick layouts per level
  const layouts = [
    // Level 1
    [[2,2],[3,2],[4,2],[5,2],[2,4],[3,4],[4,4],[5,4],[7,2],[8,2],[9,2],[10,2],[12,2],[13,2],[14,2],[15,2],[7,4],[8,4],[12,4],[13,4],[2,6],[3,6],[4,6],[5,6],[7,7],[8,7],[9,7],[10,7],[12,7],[13,7],[14,7],[15,7],[17,6],[16,6],[15,6],[2,8],[3,8],[4,8],[2,10],[3,10],[4,10],[5,10],[15,8],[16,8],[17,8],[12,10],[13,10],[14,10],[15,10],[7,9],[8,9],[9,9],[10,9],[7,11],[8,11],[9,11],[10,11],[2,12],[3,12],[5,12],[6,12],[15,12],[16,12],[17,12],[11,12],[12,12],[14,12],[2,14],[3,14],[5,14],[6,14],[7,14],[8,14],[9,14],[10,14],[11,14],[12,14],[13,14],[14,14],[15,14],[16,14],[17,14]],
    // Level 2
    [[3,1],[4,1],[5,1],[13,1],[14,1],[15,1],[3,3],[5,3],[13,3],[15,3],[7,2],[8,2],[9,2],[10,2],[7,4],[8,4],[9,4],[10,4],[2,5],[3,5],[4,5],[5,5],[14,5],[15,5],[16,5],[17,5],[2,7],[4,7],[15,7],[17,7],[7,7],[8,7],[9,7],[10,7],[7,9],[8,9],[9,9],[10,9],[5,9],[6,9],[11,9],[12,9],[2,11],[3,11],[4,11],[5,11],[14,11],[15,11],[16,11],[17,11],[2,13],[4,13],[5,13],[15,13],[17,13],[7,13],[8,13],[12,13],[13,13],[14,13],[2,14],[3,14],[5,14],[6,14],[7,14],[8,14],[12,14],[13,14],[14,14],[15,14],[17,14]],
    // Level 3
    [[5,3],[6,3],[7,3],[11,3],[12,3],[13,3],[2,2],[3,2],[15,2],[16,2],[2,4],[3,4],[15,4],[16,4],[5,5],[6,5],[11,5],[12,5],[8,4],[9,4],[10,4],[8,6],[9,6],[10,6],[5,7],[6,7],[7,7],[8,7],[9,7],[10,7],[11,7],[12,7],[13,7],[2,8],[4,8],[14,8],[16,8],[2,10],[4,10],[14,10],[16,10],[4,12],[5,12],[6,12],[7,12],[8,12],[9,12],[10,12],[11,12],[12,12],[13,12],[14,12],[2,13],[4,13],[14,13],[16,13],[2,15],[3,15],[4,15],[14,15],[15,15],[16,15]],
  ];
  const bricks = layouts[(n - 1) % layouts.length];
  bricks.forEach(([c, r]) => { if (m[r] && m[r][c] === TILE_EMPTY) m[r][c] = TILE_BRICK; });
  return m;
}

// Collision helpers
function tileAt(px, py) {
  const r = Math.floor(py / TILE);
  const c = Math.floor(px / TILE);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return TILE_STEEL;
  return map[r][c];
}

function solidTile(tile) {
  return tile === TILE_BRICK || tile === TILE_STEEL || tile === TILE_BASE;
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function rectCollidesMap(r) {
  const topLeft = tileAt(r.x + 2, r.y + 2);
  const topRight = tileAt(r.x + r.w - 2, r.y + 2);
  const bottomLeft = tileAt(r.x + 2, r.y + r.h - 2);
  const bottomRight = tileAt(r.x + r.w - 2, r.y + r.h - 2);
  return solidTile(topLeft) || solidTile(topRight) || solidTile(bottomLeft) || solidTile(bottomRight);
}

function bulletHitsMap(bullet) {
  const cx = bullet.x + bullet.w / 2;
  const cy = bullet.y + bullet.h / 2;
  const col = Math.floor(cx / TILE);
  const row = Math.floor(cy / TILE);
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return { hit: true, type: TILE_STEEL, col, row };
  const t = map[row][col];
  if (solidTile(t)) return { hit: true, type: t, col, row };
  return { hit: false, type: TILE_EMPTY, col, row };
}

// Tank class
class Tank {
  constructor(x, y, dir, color, isPlayer = false) {
    this.x = x; this.y = y; this.w = TILE - 4; this.h = TILE - 4;
    this.dir = dir;
    this.color = color;
    this.speed = isPlayer ? 2.5 : 1.2;
    this.isPlayer = isPlayer;
    this.shootCooldown = 0;
    this.shootDelay = isPlayer ? 20 : 80;
    this.active = true;
    this.aiDirTimer = 0;
    this.aiShootTimer = 0;
  }

  getRect() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }

  move(dir, adjust = true) {
    this.dir = dir;
    const nx = this.x + dx[dir] * this.speed;
    const ny = this.y + dy[dir] * this.speed;
    // Clamp to canvas
    const cx = Math.max(0, Math.min(nx, canvas.width - this.w));
    const cy = Math.max(0, Math.min(ny, canvas.height - this.h));
    const testRect = { x: cx, y: cy, w: this.w, h: this.h };
    if (!rectCollidesMap(testRect)) {
      // Check collision with other tanks
      const allTanks = this.isPlayer ? enemies : [player, ...enemies.filter(e => e !== this && e.active)];
      const collides = allTanks.filter(t => t && t.active).some(t => rectsOverlap(testRect, t.getRect()));
      if (!collides) {
        this.x = cx; this.y = cy;
      }
      return;
    }
    // Try axis-aligned slide
    if (dir === DIR_UP || dir === DIR_DOWN) {
      const slideRect = { x: this.x, y: cy, w: this.w, h: this.h };
      if (!rectCollidesMap(slideRect)) { this.y = cy; }
    } else {
      const slideRect = { x: cx, y: this.y, w: this.w, h: this.h };
      if (!rectCollidesMap(slideRect)) { this.x = cx; }
    }
  }

  shoot() {
    if (this.shootCooldown > 0) return null;
    this.shootCooldown = this.shootDelay;
    const bw = 6, bh = 6;
    let bx = this.x + this.w / 2 - bw / 2;
    let by = this.y + this.h / 2 - bh / 2;
    if (this.dir === DIR_UP) by = this.y - bh;
    else if (this.dir === DIR_DOWN) by = this.y + this.h;
    else if (this.dir === DIR_LEFT) bx = this.x - bw;
    else if (this.dir === DIR_RIGHT) bx = this.x + this.w;
    return new Bullet(bx, by, this.dir, this.isPlayer);
  }

  update() {
    if (this.shootCooldown > 0) this.shootCooldown--;
  }

  draw(ctx) {
    ctx.save();
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    ctx.translate(cx, cy);
    const angle = [0, Math.PI/2, Math.PI, -Math.PI/2][this.dir];
    ctx.rotate(angle);

    // Tank body
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);

    // Treads
    const treadW = 4;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-this.w/2 - 2, -this.h/2, treadW, this.h);
    ctx.fillRect(this.w/2 - 2, -this.h/2, treadW, this.h);

    // Tread pattern
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const ty = -this.h/2 + 4 + i * 7;
      ctx.beginPath();
      ctx.moveTo(-this.w/2 - 2, ty);
      ctx.lineTo(-this.w/2 + 2, ty);
      ctx.moveTo(this.w/2 - 2, ty);
      ctx.lineTo(this.w/2 + 2, ty);
      ctx.stroke();
    }

    // Turret barrel
    ctx.fillStyle = this.isPlayer ? '#66ff66' : '#ff9999';
    ctx.fillRect(-3, -this.h/2 - 10, 6, 14);

    // Center dot
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

// Bullet class
class Bullet {
  constructor(x, y, dir, fromPlayer) {
    this.x = x; this.y = y; this.w = 6; this.h = 6;
    this.dir = dir;
    this.speed = 5;
    this.fromPlayer = fromPlayer;
    this.active = true;
  }

  getRect() { return { x: this.x, y: this.y, w: this.w, h: this.h }; }

  update() {
    this.x += dx[this.dir] * this.speed;
    this.y += dy[this.dir] * this.speed;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.active = false;
    }
  }

  draw(ctx) {
    ctx.fillStyle = this.fromPlayer ? '#ffff44' : '#ff6666';
    ctx.shadowColor = this.fromPlayer ? '#ffff44' : '#ff6666';
    ctx.shadowBlur = 4;
    ctx.fillRect(this.x, this.y, this.w, this.h);
    ctx.shadowBlur = 0;
  }
}

// Explosion class
class Explosion {
  constructor(x, y, big = false) {
    this.x = x; this.y = y;
    this.life = big ? 20 : 12;
    this.maxLife = this.life;
    this.big = big;
  }

  update() { this.life--; }
  get active() { return this.life > 0; }

  draw(ctx) {
    const progress = 1 - this.life / this.maxLife;
    const radius = (this.big ? 28 : 18) * progress;
    const alpha = 1 - progress;
    ctx.save();
    ctx.globalAlpha = alpha;
    // Outer ring
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
    ctx.fill();
    // Inner
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius * 0.6, 0, Math.PI * 2);
    ctx.fill();
    // Core
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function createExplosion(x, y, big = false) {
  explosions.push(new Explosion(x + TILE/2, y + TILE/2, big));
}

function destroyTile(col, row) {
  if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
    if (map[row][col] === TILE_BRICK) {
      map[row][col] = TILE_EMPTY;
      return true;
    }
    if (map[row][col] === TILE_BASE) {
      map[row][col] = TILE_EMPTY;
      gameRunning = false;
      gameOver = true;
      lives = 0;
      updateUI();
    }
  }
  return false;
}

// Enemy AI
function updateEnemyAI(enemy) {
  if (!enemy.active) return;
  enemy.aiShootTimer++;

  // Change direction occasionally or when blocked
  enemy.aiDirTimer--;
  if (enemy.aiDirTimer <= 0) {
    // Sometimes head toward player
    if (Math.random() < 0.4 && player && player.active) {
      const toPlayer = Math.atan2(
        player.y + player.h/2 - (enemy.y + enemy.h/2),
        player.x + player.w/2 - (enemy.x + enemy.w/2)
      );
      if (Math.abs(Math.cos(toPlayer)) > Math.abs(Math.sin(toPlayer))) {
        enemy.dir = Math.cos(toPlayer) > 0 ? DIR_RIGHT : DIR_LEFT;
      } else {
        enemy.dir = Math.sin(toPlayer) > 0 ? DIR_DOWN : DIR_UP;
      }
    } else {
      enemy.dir = Math.floor(Math.random() * 4);
    }
    enemy.aiDirTimer = 40 + Math.floor(Math.random() * 60);
  }

  enemy.move(enemy.dir, false);

  // Shoot randomly
  if (enemy.aiShootTimer > enemy.shootDelay + Math.random() * 60 && player && player.active) {
    enemy.aiShootTimer = 0;
    return enemy.shoot();
  }
  return null;
}

function spawnEnemy() {
  if (totalEnemiesSpawned >= enemiesPerLevel || enemies.filter(e => e.active).length >= maxEnemiesOnScreen) return;

  const spawnPoints = [
    { x: TILE * 1 + 2, y: TILE * 0 + 2 },
    { x: TILE * 9 + 2, y: TILE * 0 + 2 },
    { x: TILE * 17 + 2, y: TILE * 0 + 2 },
  ];
  const sp = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];

  // Check no overlap
  const testRect = { x: sp.x, y: sp.y, w: TILE - 4, h: TILE - 4 };
  const allTanks = [player, ...enemies].filter(t => t && t.active);
  if (allTanks.some(t => rectsOverlap(testRect, t.getRect()))) return;

  const enemyColors = ['#e94560', '#ff6b6b', '#c44569', '#f19066', '#e66767', '#cf6a87'];
  const color = enemyColors[Math.floor(Math.random() * enemyColors.length)];
  const enemy = new Tank(sp.x, sp.y, DIR_DOWN, color, false);
  enemy.speed = 1.0 + level * 0.15 + Math.random() * 0.5;
  enemy.shootDelay = Math.max(30, 80 - level * 5);
  enemies.push(enemy);
  totalEnemiesSpawned++;
  enemiesRemaining = enemiesPerLevel - totalEnemiesSpawned;
  updateUI();
}

// Reset / Next level
function resetGame() {
  score = 0;
  lives = 3;
  level = 1;
  enemiesPerLevel = 20;
  totalEnemiesSpawned = 0;
  enemiesRemaining = enemiesPerLevel;
  gameOver = false;
  gameRunning = true;
  gamePaused = false;
  enemies = [];
  bullets = [];
  explosions = [];
  enemySpawnTimer = 0;
  map = getLevelMap(level);
  // Place player near bottom center
  player = new Tank(TILE * 9 + 2, TILE * 15 + 2, DIR_UP, '#4ecdc4', true);
  updateUI();
}

function nextLevel() {
  level++;
  enemiesPerLevel = 20 + (level - 1) * 2;
  totalEnemiesSpawned = 0;
  enemiesRemaining = enemiesPerLevel;
  enemies = [];
  bullets = [];
  explosions = [];
  enemySpawnTimer = 0;
  map = getLevelMap(level);
  player = new Tank(TILE * 9 + 2, TILE * 15 + 2, DIR_UP, '#4ecdc4', true);
  updateUI();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('remaining').textContent = enemiesRemaining;
  document.getElementById('level').textContent = level;
  document.getElementById('livesDisplay').innerHTML =
    Array.from({ length: Math.max(0, lives) }, () => '🛡️').join(' ');
  const msgEl = document.getElementById('statusMsg');
  if (gameOver && lives <= 0) {
    msgEl.textContent = '游戏结束！按 Enter 重新开始';
    msgEl.style.color = '#e94560';
  } else if (gameOver) {
    msgEl.textContent = '基地被摧毁！按 Enter 重新开始';
    msgEl.style.color = '#e94560';
  } else if (gamePaused) {
    msgEl.textContent = '已暂停 - 按 Enter 继续';
    msgEl.style.color = '#f5c518';
  } else {
    msgEl.textContent = '';
  }
}

// Main game loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function update() {
  if (!gameRunning || gamePaused || gameOver) return;

  // Player input
  if (player && player.active) {
    if (keys['ArrowUp'] || keys['w']) player.move(DIR_UP);
    else if (keys['ArrowDown'] || keys['s']) player.move(DIR_DOWN);
    else if (keys['ArrowLeft'] || keys['a']) player.move(DIR_LEFT);
    else if (keys['ArrowRight'] || keys['d']) player.move(DIR_RIGHT);

    if (keys[' ']) {
      const b = player.shoot();
      if (b) bullets.push(b);
    }
    player.update();
  }

  // Spawn enemies
  enemySpawnTimer++;
  if (enemySpawnTimer >= enemySpawnInterval && enemies.filter(e => e.active).length < maxEnemiesOnScreen && totalEnemiesSpawned < enemiesPerLevel) {
    enemySpawnTimer = 0;
    spawnEnemy();
  }

  // Update enemies
  enemies.forEach(enemy => {
    if (!enemy.active) return;
    enemy.update();
    const b = updateEnemyAI(enemy);
    if (b) bullets.push(b);
  });

  // Update bullets
  bullets.forEach(bullet => {
    if (!bullet.active) return;
    bullet.update();

    // Check map collision
    const mapHit = bulletHitsMap(bullet);
    if (mapHit.hit) {
      bullet.active = false;
      const destroyed = destroyTile(mapHit.col, mapHit.row);
      if (destroyed) {
        createExplosion(mapHit.col * TILE, mapHit.row * TILE, false);
      }
      if (mapHit.type === TILE_STEEL) {
        createExplosion(mapHit.col * TILE, mapHit.row * TILE, false);
      }
      return;
    }

    // Tank collision
    if (bullet.fromPlayer) {
      enemies.forEach(enemy => {
        if (!enemy.active || !bullet.active) return;
        if (rectsOverlap(bullet.getRect(), enemy.getRect())) {
          bullet.active = false;
          enemy.active = false;
          createExplosion(enemy.x, enemy.y, true);
          score += 100;
          updateUI();
        }
      });
    } else {
      if (player && player.active && bullet.active && rectsOverlap(bullet.getRect(), player.getRect())) {
        bullet.active = false;
        player.active = false;
        createExplosion(player.x, player.y, true);
        lives--;
        updateUI();
        if (lives <= 0) {
          gameOver = true;
          gameRunning = false;
        } else {
          // Respawn player
          setTimeout(() => {
            if (!gameOver) {
              player = new Tank(TILE * 9 + 2, TILE * 15 + 2, DIR_UP, '#4ecdc4', true);
            }
          }, 1000);
        }
      }
    }
  });

  // Bullet vs bullet
  for (let i = 0; i < bullets.length; i++) {
    for (let j = i + 1; j < bullets.length; j++) {
      if (bullets[i].active && bullets[j].active &&
          bullets[i].fromPlayer !== bullets[j].fromPlayer &&
          rectsOverlap(bullets[i].getRect(), bullets[j].getRect())) {
        bullets[i].active = false;
        bullets[j].active = false;
        createExplosion(bullets[i].x, bullets[i].y, false);
      }
    }
  }

  // Cleanup
  bullets = bullets.filter(b => b.active);
  enemies = enemies.filter(e => e.active || e === undefined);
  explosions = explosions.filter(e => e.active);

  // Check win condition
  if (totalEnemiesSpawned >= enemiesPerLevel && enemies.filter(e => e.active).length === 0 && gameRunning && !gameOver) {
    score += 500;
    if (level >= 3) {
      gameRunning = false;
      gameOver = true;
      document.getElementById('statusMsg').textContent = '恭喜通关！按 Enter 重新开始';
      document.getElementById('statusMsg').style.color = '#4ecdc4';
      updateUI();
    } else {
      nextLevel();
    }
  }
}

function drawMap() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = map[r][c];
      const x = c * TILE, y = r * TILE;
      if (tile === TILE_BRICK) {
        ctx.fillStyle = '#b5651d';
        ctx.fillRect(x, y, TILE, TILE);
        // Brick pattern
        ctx.fillStyle = '#8b4513';
        ctx.fillRect(x + 1, y + 1, TILE/2 - 2, TILE/2 - 2);
        ctx.fillRect(x + TILE/2 + 1, y + TILE/2 + 1, TILE/2 - 2, TILE/2 - 2);
        ctx.strokeStyle = '#6b3410';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
      } else if (tile === TILE_STEEL) {
        ctx.fillStyle = '#6b7280';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#9ca3af';
        ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
        ctx.fillStyle = '#4b5563';
        ctx.fillRect(x + 4, y + 4, TILE - 8, TILE - 8);
      } else if (tile === TILE_BASE) {
        // Base flag
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#e94560';
        ctx.beginPath();
        ctx.moveTo(x + 6, y + 6);
        ctx.lineTo(x + TILE - 6, y + TILE/2);
        ctx.lineTo(x + 6, y + TILE - 6);
        ctx.closePath();
        ctx.fill();
      }
    }
  }
}

function draw() {
  // Background
  ctx.fillStyle = '#111118';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawMap();

  // Draw tanks
  enemies.forEach(e => { if (e.active) e.draw(ctx); });
  if (player && player.active) player.draw(ctx);

  // Draw bullets
  bullets.forEach(b => b.draw(ctx));

  // Draw explosions
  explosions.forEach(e => e.draw(ctx));

  // Respawn invincibility flash
  if (player && player.active && !gameOver && lives < 3) {
    // Brief flash on respawn - handled by setTimeout making player null briefly
  }

  // Draw overlay only when paused (not when waiting to start)
  if (gamePaused && !gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  // Show start hint on canvas
  if (!gameRunning && !gameOver && !gamePaused) {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.font = 'bold 22px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('按 Enter 或 点击画面 开始', canvas.width/2, canvas.height/2 + 60);
    ctx.textAlign = 'start';
  }
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 40px "Courier New"';
    ctx.textAlign = 'center';
    if (lives <= 0) {
      ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
    } else if (level > 3) {
      ctx.fillText('YOU WIN!', canvas.width/2, canvas.height/2 - 20);
    }
    ctx.font = '16px "Courier New"';
    ctx.fillText('按 Enter 重新开始', canvas.width/2, canvas.height/2 + 30);
    ctx.textAlign = 'start';
  }
  if (gamePaused && !gameOver) {
    ctx.fillStyle = '#f5c518';
    ctx.font = 'bold 36px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
    ctx.textAlign = 'start';
  }
}

// Initialize
map = getLevelMap(1);
player = new Tank(TILE * 9 + 2, TILE * 15 + 2, DIR_UP, '#4ecdc4', true);
updateUI();
gameLoop();
</script>
